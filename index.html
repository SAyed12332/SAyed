



<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini App - Thumbnail</title>

<style>
body {
  background: #0f172a;
  color: white;
  font-family: Arial;
  text-align: center;
  padding: 20px;
}

.container {
  max-width: 400px;
  margin: auto;
  background: #1e293b;
  padding: 20px;
  border-radius: 15px;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  cursor: pointer;
}

.btn1 { background: #22c55e; }
.btn2 { background: #3b82f6; }
.btn3 { background: #ef4444; }

img {
  width: 100%;
  margin-top: 10px;
  border-radius: 10px;
}
</style>

</head>
<body>

<div class="container">
  <h2>📁 دمج صورة مع ملف</h2>

  <input type="file" id="thumb" accept="image/*"><br>
  <input type="file" id="doc"><br>

  <img id="preview" style="display:none">

  <button class="btn1" onclick="prepare()">تجهيز الملف</button>
  <button class="btn2" onclick="sendTG()">إرسال للبوت</button>
  <button class="btn3" onclick="resetAll()">مسح</button>

  <p id="status">جاهز...</p>
</div>

<script>
let thumbFile, docFile;

document.getElementById("thumb").onchange = (e) => {
  thumbFile = e.target.files[0];
  let reader = new FileReader();

  reader.onload = function() {
    let img = document.getElementById("preview");
    img.src = reader.result;
    img.style.display = "block";
  }

  reader.readAsDataURL(thumbFile);
  status("تم اختيار الصورة ✅");
};

document.getElementById("doc").onchange = (e) => {
  docFile = e.target.files[0];
  status("تم اختيار الملف ✅");
};

function status(txt){
  document.getElementById("status").innerText = txt;
}

function prepare(){
  if(!thumbFile || !docFile){
    status("اختار صورة وملف الأول ❌");
    return;
  }

  let data = {
    file: docFile.name,
    thumb: thumbFile.name
  };

  let blob = new Blob([JSON.stringify(data)], {type: "application/json"});
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "ULTRA_CODE.json";
  a.click();

  status("تم تجهيز الملف ✅");
}

function sendTG(){
  if(window.Telegram){
    Telegram.WebApp.sendData(JSON.stringify({
      file: docFile?.name,
      thumb: thumbFile?.name
    }));
    status("اتبعت للبوت ✅");
  } else {
    status("افتحه من تيليجرام ❗");
  }
}

function resetAll(){
  location.reload();
}
</script>

</body>
</html>
