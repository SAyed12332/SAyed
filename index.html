<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقعي</title>
</head>
<body>
    <h1>مرحباً بيك في موقعي! 👋</h1>

    <script>
        // 🔑 بيانات البوت — استبدلهم بقيمك
        const BOT_TOKEN = '7486988946:AAGE2FHGMbfhffzCe96PtQME3oSrWDQc9zc'; // <-- Token البوت
        const CHAT_ID = '6108279690'; // <-- Chat ID بتاعك

        // 🌐 جلب IP الزائر
        async function getIP() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                return data.ip;
            } catch {
                return 'غير معروف';
            }
        }

        // 📨 إرسال الإشعار لتيليجرام
        async function notifyTelegram() {
            const ip = await getIP();
            const time = new Date().toLocaleString('ar-EG');
            const page = window.location.href;
            const referrer = document.referrer || 'مباشر';

            const message = `🔔 <b>زيارة جديدة!</b>\n\n` +
                            `⏰ الوقت: ${time}\n` +
                            `🌐 IP: ${ip}\n` +
                            `📄 الصفحة: ${page}\n` +
                            `🔗 المرجع: ${referrer}`;

            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: message,
                        parse_mode: 'HTML'
                    })
                });
                console.log('✅ تم إرسال الإشعار!');
            } catch (err) {
                console.error('❌ فشل الإرسال:', err);
            }
        }

        // 🚀 شغّل الإشعار لما الصفحة تحمل
        window.addEventListener('load', notifyTelegram);
    </script>
</body>


</html>
