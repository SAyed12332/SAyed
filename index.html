<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🧠 حافظ الإنجليزي - كامل + اختبار</title>
  <style>
    :root { --primary: #2c3e50; --accent: #27ae60; --danger: #e74c3c; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: linear-gradient(135deg, #e0f7fa, #fff3e0);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 1100px;
      margin: 0 auto;
      background: white;
      border-radius: 20px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.1);
      overflow: hidden;
    }
    header {
      background: var(--primary);
      color: white;
      padding: 25px;
      text-align: center;
    }
    .tabs {
      display: flex;
      flex-wrap: wrap;
      background: #f1f1f1;
    }
    .tab {
      padding: 16px 12px;
      flex: 1;
      text-align: center;
      cursor: pointer;
      font-weight: bold;
      min-width: 100px;
    }
    .tab.active {
      background: white;
      color: var(--accent);
      border-bottom: 5px solid var(--accent);
    }
    .card {
      background: #f8fff9;
      margin: 18px;
      padding: 20px;
      border-radius: 15px;
      border-right: 6px solid var(--accent);
    }
    .question { font-size: 1.1rem; margin-bottom: 15px; color: #2c3e50; }
    .answer, .translation, .mnemonic {
      padding: 14px;
      border-radius: 10px;
      margin: 10px 0;
    }
    .answer { background: #e8f5e9; color: #27ae60; font-weight: bold; }
    .translation { background: #e3f2fd; }
    .mnemonic { background: #fff3e0; border-left: 5px solid #ff9800; }

    /* Quiz Styles */
    .quiz-option {
      padding: 14px;
      margin: 8px 0;
      border: 2px solid #ddd;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
    }
    .quiz-option:hover { background: #f0f8ff; }
    .quiz-option.selected { border-color: var(--accent); background: #e8f5e9; }
    .result { margin-top: 20px; padding: 20px; border-radius: 15px; font-size: 1.2rem; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🧠 حافظ الإنجليزي - النسخة الكاملة</h1>
      <p>جميع الأسئلة + إجابات + ترجمة + ربط ذهني + وضع اختبار</p>
    </header>

    <div class="tabs">
      <div class="tab active" data-tab="1">الإيمان</div>
      <div class="tab" data-tab="2">الصلاة</div>
      <div class="tab" data-tab="3">الزكاة</div>
      <div class="tab" data-tab="4">النحو</div>
      <div class="tab" data-tab="5">أسئلة مقالية</div>
      <div class="tab" data-tab="6">وضع الاختبار</div>
    </div>

    <div id="content"></div>
  </div>

  <script>
    const data = {
      1: [
        { q: "Every Muslim .......... observe the five pillars of Islam.", a: "must", trans: "يجب على كل مسلم أن يؤدي أركان الإسلام الخمسة", mnemonic: "must = يجب (إلزامي)" },
        { q: "Belief in Allah is the central .......... of the Islamic faith.", a: "tenet", trans: "الإيمان بالله هو المبدأ الأساسي", mnemonic: "tenet = مبدأ (Ten Commandments)" },
        { q: "Muhammad (PBUH) is the .......... prophet of Allah.", a: "last", trans: "محمد ﷺ هو آخر نبي", mnemonic: "last = الأخير" },
        { q: "Recitation of Shahada marks the .......... to Islam.", a: "conversion", trans: "نطق الشهادة = الدخول في الإسلام", mnemonic: "conversion = اعتناق" },
        { q: "Muslims do everything for the .......... of Allah alone.", a: "sake", trans: "من أجل الله فقط", mnemonic: "for the sake of = من أجل" },
        { q: "The five pillars work in .......... with one another.", a: "harmony", trans: "تعمل بتناسق", mnemonic: "harmony = تناغم" },
        { q: "Monotheism is the belief in the .......... of Allah.", a: "oneness", trans: "التوحيد = وحدانية الله", mnemonic: "oneness = واحدية" },
        { q: "The second part of Shahada is the testament that Muhammad is the .......... prophet.", a: "seal", trans: "خاتم الأنبياء", mnemonic: "seal = خاتم" },
        { q: "As you know that the creator of this universe is One, you are to ..........", a: "worship", trans: "يجب أن تعبده", mnemonic: "worship = تعبد" },
        { q: "The recitation of Shahadah marks someone's .......... of Islam.", a: "embracing", trans: "احتضان / اعتناق الإسلام", mnemonic: "embracing = احتضان" }
      ],
      2: [
        { q: "Prayer protects an individual from all sorts of abominations and ........ vices.", a: "vices", trans: "تحمي من الرذائل", mnemonic: "vices = رذائل" },
        { q: "Prayer is the first practical ........ that leads to salvation.", a: "devotion", trans: "أول عبادة عملية", mnemonic: "devotion = عبادة" },
        { q: "Believers who offer their prayers with sincerity are the ........", a: "successful", trans: "الناجحون", mnemonic: "successful = ناجحون" },
        { q: "There are no ........ between the worshipper and God.", a: "intermediaries", trans: "لا وسطاء", mnemonic: "intermediaries = وسطاء" },
        { q: "Prayer is a practical devotion prescribed ........ times a day.", a: "five", trans: "خمس مرات يومياً", mnemonic: "five = 5" },
        { q: "........ five Prayers is the distinctive mark of a Muslim.", a: "Performing", trans: "أداء الصلاة الخمس", mnemonic: "Performing = أداء" },
        { q: "Muslims perform five prayers a ........ day.", a: "day", trans: "في اليوم", mnemonic: "a day = يومياً" },
        { q: "Prayers associate you with worldly engagements for a few ........", a: "moments", trans: "للحظات قليلة", mnemonic: "moments = لحظات" },
        { q: "Prayers strengthen and enliven the ........ in Allah.", a: "belief", trans: "تقوي الإيمان", mnemonic: "belief = إيمان" },
        { q: "Timing of the prayers doesn't ........ with worldly activities.", a: "contradict", trans: "لا تتعارض", mnemonic: "contradict = تتعارض" }
      ],
      3: [
        { q: "Zakah is a / an ........ part of Islam.", a: "obligatory", trans: "جزء واجب", mnemonic: "obligatory = واجب" },
        { q: "Wealth is ........ by paying Zakah.", a: "purified", trans: "يُطهر المال", mnemonic: "purified = مطهر" },
        { q: "All things and properties ........ to Allah.", a: "belong", trans: "تعود لله", mnemonic: "belong = تنتمي" },
        { q: "Muslims believe that the wealth they own is held in ........", a: "trust", trans: "أمانة", mnemonic: "trust = أمانة" },
        { q: "Zakah is ........ on the rich to pay for the poor.", a: "prescribed", trans: "مفروضة", mnemonic: "prescribed = مفروض" },
        { q: "Zakah can ........ the gaps between social classes.", a: "narrow", trans: "تضيق الفجوات", mnemonic: "narrow = تضيق" },
        { q: "Zakah develops the tendency to ........ others.", a: "assist", trans: "مساعدة الآخرين", mnemonic: "assist = يساعد" },
        { q: "Zakah is an act of worship that removes human ........ and selfishness.", a: "greed", trans: "يزيل الطمع", mnemonic: "greed = طمع" }
      ],
      4: [
        { q: "Cairo is the (big - bigger - biggest) city in Africa.", a: "biggest", trans: "أكبر مدينة", mnemonic: "biggest = الأكبر" },
        { q: "She is the (tall - taller - tallest) girl in this class.", a: "tallest", trans: "أطول فتاة", mnemonic: "tallest = الأطول" },
        { q: "This is the (good - better - best) book I have ever read.", a: "best", trans: "أفضل كتاب", mnemonic: "best = الأفضل" },
        { q: "His car is (expensive - more expensive - the most expensive) than my car.", a: "more expensive", trans: "أغلى", mnemonic: "more expensive = أغلى" },
        { q: "Anne is a (beautiful - more beautiful - most beautiful) woman.", a: "beautiful", trans: "جميلة", mnemonic: "beautiful = صفة أساسية" }
      ],
      5: [
        { q: "Where was Muhammad born?", a: "He was born in Mecca.", trans: "ولد في مكة", mnemonic: "Mecca = مكة المكرمة" },
        { q: "Who took care of Muhammad as a little child?", a: "His uncle Abu Talib.", trans: "عمه أبو طالب", mnemonic: "Abu Talib = حامي النبي" },
        { q: "What was Muhammad's first job?", a: "He worked mostly as a shepherd and later as a merchant.", trans: "راعي غنم ثم تاجر", mnemonic: "Shepherd = راعي" },
        { q: "How old was he when he first married?", a: "He first married by age 25.", trans: "تزوج في سن 25", mnemonic: "25 سنة" },
        { q: "Where was Muhammad when he received his first revelation from God?", a: "In the Cave of Hira.", trans: "في غار حراء", mnemonic: "Hira = غار حراء" },
        { q: "When did he start to announce his revelation in public?", a: "At age 40.", trans: "في سن الأربعين", mnemonic: "40 = بداية الدعوة" },
        { q: "Did Meccan tribes welcome Muhammad's message?", a: "No, They didn't.", trans: "لا، لم يرحبوا", mnemonic: "No = رفض قريش" },
        { q: "To where did Muslims first migrate?", a: "Muslims first migrated to Abyssinia.", trans: "إلى الحبشة", mnemonic: "Abyssinia = أول هجرة" },
        { q: "Mention three important qualities that you know about Prophet Muhammad.", a: "He was a religious, political and military leader.", trans: "قائد ديني وسياسي وعسكري", mnemonic: "3 صفات" },
        { q: "What do the underlined pronouns refer to?", a: "His → Uncle Abu Talib\nHe → Prophet Muhammad", trans: "his = أبو طالب\nhe = النبي محمد", mnemonic: "his/he = ضمائر" }
      ]
    };

    let currentTab = 1;

    function render() {
      const content = document.getElementById('content');
      content.innerHTML = '';

      if (currentTab === 6) {
        renderQuiz();
        return;
      }

      const titles = ['الإيمان', 'الصلاة', 'الزكاة', 'النحو', 'أسئلة مقالية'];
      content.innerHTML = `<h2 style="text-align:center; margin:25px 0;">${titles[currentTab-1]}</h2>`;

      data[currentTab].forEach((item, i) => {
        content.innerHTML += `
          <div class="card">
            <div class="question">${i+1}. ${item.q}</div>
            <div class="answer">✅ ${item.a}</div>
            <div class="translation">📖 ${item.trans}</div>
            <div class="mnemonic">🧠 ${item.mnemonic}</div>
          </div>
        `;
      });
    }

    function renderQuiz() {
      const content = document.getElementById('content');
      let html = `<h2 style="text-align:center; margin:25px 0; color:#2c3e50;">وضع الاختبار التفاعلي</h2>`;
      
      // Combine all questions for quiz
      let allQuestions = [];
      Object.values(data).forEach(arr => allQuestions = allQuestions.concat(arr));

      allQuestions.slice(0, 15).forEach((q, index) => {
        html += `
          <div class="card">
            <div class="question">${index+1}. ${q.q}</div>
            <div class="quiz-option" data-index="\( {index}" data-answer=" \){q.a}">${q.a}</div>
          </div>`;
      });

      html += `<button onclick="checkQuiz()" style="display:block; margin:20px auto; padding:15px 30px; background:var(--accent); color:white; border:none; border-radius:10px; font-size:18px;">تصحيح الاختبار</button>`;
      content.innerHTML = html;
    }

    function checkQuiz() {
      alert("تم تصميم الاختبار بنجاح! (في النسخة الحالية يمكنك التحقق يدوياً من الإجابات في الأقسام الأخرى).");
    }

    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentTab = parseInt(tab.dataset.tab);
        render();
      });
    });

    // Initial render
    render();
  </script>
</body>
</html>
