<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 Not Found</title>
  <link rel="icon" href="https://www.google.com/favicon.ico" type="image/x-icon">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Roboto, Arial, sans-serif;
      background: #fff;
      color: #202124;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Top Google bar ── */
    .g-bar {
      width: 100%;
      height: 60px;
      background: #fff;
      border-bottom: 1px solid #e8eaed;
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 14px;
    }

    /* User logo in top bar */
    .g-logo {
      height: 130px;
      width: 130px;
      display: block;
      flex-shrink: 0;
      overflow: visible;
      margin-left: -40px;
    }

    .g-bar-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .g-signin-btn {
      background: #1a73e8;
      color: #fff;
      font-family: 'Google Sans', Roboto, Arial, sans-serif;
      font-size: 14px;
      font-weight: 500;
      border: none;
      border-radius: 4px;
      padding: 8px 18px;
      cursor: pointer;
      letter-spacing: 0.25px;
    }
    .g-signin-btn:hover { background: #1765cc; }

    /* ── Main error container ── */
    .error-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 48px 24px 24px;
    }

    /* Dinosaur / Robot illustration — Google uses the T-Rex */
    .dino-img {
      width: 200px;
      margin-bottom: 32px;
      opacity: 0.9;
    }

    /* Error code */
    .error-code {
      font-size: 100px;
      font-weight: 700;
      color: #dadce0;
      line-height: 1;
      letter-spacing: -4px;
      font-family: Roboto, Arial, sans-serif;
      margin-bottom: 8px;
    }

    /* "That's an error." */
    .error-title {
      font-size: 24px;
      font-weight: 400;
      color: #202124;
      margin-bottom: 12px;
    }

    .error-desc {
      font-size: 14px;
      color: #5f6368;
      max-width: 460px;
      line-height: 1.6;
      margin-bottom: 6px;
    }

    .error-url {
      font-size: 14px;
      color: #5f6368;
      font-style: italic;
      margin-bottom: 28px;
    }

    .error-hint {
      font-size: 14px;
      color: #5f6368;
      margin-bottom: 36px;
    }

    /* Google blue link */
    a.g-link {
      color: #1a73e8;
      text-decoration: none;
      font-size: 14px;
    }
    a.g-link:hover { text-decoration: underline; }

    /* ── Divider before Telegram section ── */
    .sep {
      width: 320px;
      max-width: 90%;
      border: none;
      border-top: 1px solid #e8eaed;
      margin: 8px auto 28px;
    }

    /* ── Telegram section — plain HTML blue button as requested ── */
    .tg-section {
      text-align: center;
      margin-bottom: 48px;
    }

    .tg-section p {
      font-size: 13px;
      color: #5f6368;
      margin-bottom: 10px;
    }

    /*
     * Classic browser-native HTML button
     * with the standard blue #0000EE link color
     */
    .tg-section a.html-btn {
      display: inline-block;
      font-family: Arial, sans-serif;
      font-size: 13.3px;
      color: #0000EE;
      text-decoration: underline;
      background: #d0cbc7;
      border: 2px solid;
      border-color: #f5f5f5 #6b6b6b #6b6b6b #f5f5f5;
      padding: 4px 12px 5px;
      cursor: pointer;
      user-select: none;
      outline-offset: 1px;
    }
    .tg-section a.html-btn:hover  { background: #c3bebb; }
    .tg-section a.html-btn:active {
      border-color: #6b6b6b #f5f5f5 #f5f5f5 #6b6b6b;
      padding: 5px 11px 4px 13px;
    }
    .tg-section a.html-btn:visited { color: #551A8B; }

    /* ── Bottom Google footer ── */
    footer {
      background: #f8f9fa;
      border-top: 1px solid #e8eaed;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      height: 46px;
      flex-shrink: 0;
    }

    .footer-left, .footer-right {
      display: flex;
      gap: 24px;
      align-items: center;
    }

    footer a {
      font-size: 13px;
      color: #5f6368;
      text-decoration: none;
    }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <!-- Google top bar -->
  <div class="g-bar">
    <!-- ELSayed AshRaf logo -->
    <svg class="g-logo" width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="gradPro" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#00c6ff"/>
          <stop offset="100%" stop-color="#0072ff"/>
        </linearGradient>
      </defs>
      <g transform="translate(90,90) scale(0.65)">
        <path d="
          M160 340
          C160 260, 350 260, 350 180
          C350 110, 180 110, 180 180

          M220 340
          L260 180
          L300 340
        "
        fill="none"
        stroke="url(#gradPro)"
        stroke-width="18"
        stroke-linecap="round"
        stroke-linejoin="round"/>
      </g>
    </svg>

    <div class="g-bar-right">
      <button class="g-signin-btn">Sign in</button>
    </div>
  </div>

  <!-- Main content -->
  <div class="error-container">

    <!-- Google T-Rex SVG (offline dino — Google's actual 404 mascot) -->
    <svg class="dino-img" viewBox="0 0 200 150" xmlns="http://www.w3.org/2000/svg">
      <!-- Body -->
      <ellipse cx="105" cy="90" rx="45" ry="30" fill="#5f6368"/>
      <!-- Head -->
      <rect x="130" y="44" width="50" height="34" rx="10" fill="#5f6368"/>
      <!-- Jaw -->
      <rect x="130" y="66" width="52" height="16" rx="6" fill="#5f6368"/>
      <!-- Eye -->
      <circle cx="168" cy="54" r="5" fill="#fff"/>
      <circle cx="169" cy="54" r="2.5" fill="#202124"/>
      <!-- Nostril -->
      <circle cx="178" cy="61" r="2" fill="#9aa0a6"/>
      <!-- Tiny arm -->
      <line x1="120" y1="88" x2="108" y2="100" stroke="#5f6368" stroke-width="7" stroke-linecap="round"/>
      <!-- Legs -->
      <rect x="85"  y="115" width="14" height="30" rx="5" fill="#5f6368"/>
      <rect x="107" y="118" width="14" height="28" rx="5" fill="#5f6368"/>
      <!-- Tail -->
      <path d="M62 88 Q30 82 20 100" stroke="#5f6368" stroke-width="14" fill="none" stroke-linecap="round"/>
      <!-- Spikes on back -->
      <polygon points="95,60 100,44 105,60" fill="#9aa0a6"/>
      <polygon points="108,56 113,40 118,56" fill="#9aa0a6"/>
      <polygon points="120,56 125,42 130,56" fill="#9aa0a6"/>
      <!-- Ground shadow -->
      <ellipse cx="100" cy="145" rx="72" ry="5" fill="#e8eaed"/>
    </svg>

    <div class="error-code">404</div>

    <h1 class="error-title">That's an error.</h1>

    <p class="error-desc">
      The requested URL was not found on this server.
    </p>

    <p class="error-hint">
      That's all we know. &nbsp;<a class="g-link" href="javascript:history.back()">Go back</a>
    </p>

    <hr class="sep">

    <!-- Telegram contact — regular blue HTML button as requested -->
    <div class="tg-section">
      <p>Need help? Contact the site admin:</p>
      <a href="https://t.me/elsayedashraf" target="_blank" class="html-btn">
        📬 t.me/elsayedashraf
      </a>
    </div>

  </div>

  <!-- Google footer -->
  <footer>
    <div class="footer-left">
      <a href="#">Advertising</a>
      <a href="#">Business</a>
      <a href="#">About</a>
    </div>
    <div class="footer-right">
      <a href="#">Privacy</a>
      <a href="#">Terms</a>
      <a href="#">Settings</a>
    </div>
  </footer>

</body>
</html>
