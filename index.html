
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🧩 ليجو بازل</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-user-select:none; user-select:none; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #1b1b2f;
            min-height: 100vh;
            overflow: hidden;
            color: white;
            touch-action: none;
        }
        canvas { display:block; }
    </style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script>
// ===== TELEGRAM =====
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); tg.setHeaderColor('#1b1b2f'); tg.setBackgroundColor('#1b1b2f'); }

// ===== CANVAS SETUP =====
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let W, H, dpr;

function resizeCanvas() {
    dpr = window.devicePixelRatio || 1;
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resizeCanvas();
window.addEventListener('resize', () => { resizeCanvas(); draw(); });

// ===== PUZZLE PIECE IMAGE (from URL) =====
const puzzlePieceImg = new Image();
puzzlePieceImg.crossOrigin = 'anonymous';
puzzlePieceImg.src = 'https://www.genspark.ai/api/files/s/ByFKTxwR';
let pieceImgLoaded = false;
puzzlePieceImg.onload = () => { pieceImgLoaded = true; initGame(); };
puzzlePieceImg.onerror = () => { pieceImgLoaded = false; initGame(); };

// ===== GAME STATE =====
let gameState = 'menu'; // menu, playing, win
let currentLevel = 0;
let pieces = [];
let slots = [];
let dragging = null;
let dragOffX = 0, dragOffY = 0;
let moves = 0;
let startTime = 0;
let elapsed = 0;
let timerInterval = null;
let score = 0;
let particles = [];
let stars = 0;
let menuAnim = 0;
let bgStars = [];

// Level configs
const LEVELS = [
    { name: 'سهل', cols: 3, rows: 2, emoji: '🟢' },
    { name: 'متوسط', cols: 4, rows: 3, emoji: '🟡' },
    { name: 'صعب', cols: 5, rows: 4, emoji: '🔴' },
    { name: 'خبير', cols: 6, rows: 5, emoji: '💀' },
];

// BG Stars
for (let i = 0; i < 80; i++) {
    bgStars.push({ x: Math.random(), y: Math.random(), r: Math.random()*1.5+0.5, s: Math.random()*0.5+0.3, a: Math.random()*Math.PI*2 });
}

// ===== PUZZLE PIECE PATH (jigsaw shape) =====
function drawJigsawPiece(ctx, x, y, w, h, tabs) {
    // tabs = { top: -1/0/1, right: -1/0/1, bottom: -1/0/1, left: -1/0/1 }
    // 1 = tab out, -1 = tab in (hole), 0 = flat
    const tabSize = Math.min(w, h) * 0.18;
    const neck = tabSize * 0.6;

    ctx.beginPath();
    ctx.moveTo(x, y);

    // Top edge
    if (tabs.top === 0) {
        ctx.lineTo(x + w, y);
    } else {
        const dir = tabs.top;
        ctx.lineTo(x + w*0.35, y);
        ctx.lineTo(x + w*0.35, y - dir*neck);
        ctx.arc(x + w*0.5, y - dir*(neck+tabSize*0.5), tabSize*0.5, Math.PI, 0, dir > 0);
        ctx.lineTo(x + w*0.65, y - dir*neck);
        ctx.lineTo(x + w*0.65, y);
        ctx.lineTo(x + w, y);
    }

    // Right edge
    if (tabs.right === 0) {
        ctx.lineTo(x + w, y + h);
    } else {
        const dir = tabs.right;
        ctx.lineTo(x + w, y + h*0.35);
        ctx.lineTo(x + w + dir*neck, y + h*0.35);
        ctx.arc(x + w + dir*(neck+tabSize*0.5), y + h*0.5, tabSize*0.5, -Math.PI/2, Math.PI/2, dir < 0);
        ctx.lineTo(x + w + dir*neck, y + h*0.65);
        ctx.lineTo(x + w, y + h*0.65);
        ctx.lineTo(x + w, y + h);
    }

    // Bottom edge
    if (tabs.bottom === 0) {
        ctx.lineTo(x, y + h);
    } else {
        const dir = tabs.bottom;
        ctx.lineTo(x + w*0.65, y + h);
        ctx.lineTo(x + w*0.65, y + h + dir*neck);
        ctx.arc(x + w*0.5, y + h + dir*(neck+tabSize*0.5), tabSize*0.5, 0, Math.PI, dir > 0);
        ctx.lineTo(x + w*0.35, y + h + dir*neck);
        ctx.lineTo(x + w*0.35, y + h);
        ctx.lineTo(x, y + h);
    }

    // Left edge
    if (tabs.left === 0) {
        ctx.lineTo(x, y);
    } else {
        const dir = tabs.left;
        ctx.lineTo(x, y + h*0.65);
        ctx.lineTo(x - dir*neck, y + h*0.65);
        ctx.arc(x - dir*(neck+tabSize*0.5), y + h*0.5, tabSize*0.5, Math.PI/2, -Math.PI/2, dir < 0);
        ctx.lineTo(x - dir*neck, y + h*0.35);
        ctx.lineTo(x, y + h*0.35);
        ctx.lineTo(x, y);
    }

    ctx.closePath();
}

// ===== GENERATE PUZZLE IMAGE ON CANVAS =====
function generatePuzzleImage(cols, rows) {
    const puzzleCanvas = document.createElement('canvas');
    const pw = cols * 80;
    const ph = rows * 80;
    puzzleCanvas.width = pw;
    puzzleCanvas.height = ph;
    const pctx = puzzleCanvas.getContext('2d');

    // Draw a beautiful lego-style mosaic
    const palette = [
        ['#e74c3c','#c0392b'], ['#3498db','#2980b9'], ['#2ecc71','#27ae60'],
        ['#f1c40f','#e67e22'], ['#9b59b6','#8e44ad'], ['#e67e22','#d35400'],
        ['#1abc9c','#16a085'], ['#fd79a8','#e84393'], ['#00cec9','#0984e3']
    ];

    // Create a pattern using the piece image and colors
    const cellW = pw / cols;
    const cellH = ph / rows;

    // Generate a random color map for the lego board
    const colorMap = [];
    for (let r = 0; r < rows; r++) {
        colorMap[r] = [];
        for (let c = 0; c < cols; c++) {
            colorMap[r][c] = palette[Math.floor(Math.random() * palette.length)];
        }
    }

    // Draw the lego base plate
    pctx.fillStyle = '#2d2d2d';
    pctx.fillRect(0, 0, pw, ph);

    // Draw each lego brick
    for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
            const bx = c * cellW;
            const by = r * cellH;
            const [col1, col2] = colorMap[r][c];

            // Brick body
            const grad = pctx.createLinearGradient(bx, by, bx + cellW, by + cellH);
            grad.addColorStop(0, col1);
            grad.addColorStop(1, col2);
            pctx.fillStyle = grad;
            pctx.fillRect(bx + 2, by + 2, cellW - 4, cellH - 4);

            // Lego stud (circle on top)
            const studR = Math.min(cellW, cellH) * 0.22;
            pctx.beginPath();
            pctx.arc(bx + cellW/2, by + cellH/2, studR, 0, Math.PI*2);
            pctx.fillStyle = col1;
            pctx.fill();
            pctx.strokeStyle = 'rgba(255,255,255,0.35)';
            pctx.lineWidth = 2;
            pctx.stroke();

            // Highlight
            pctx.beginPath();
            pctx.arc(bx + cellW/2 - studR*0.25, by + cellH/2 - studR*0.25, studR*0.45, 0, Math.PI*2);
            pctx.fillStyle = 'rgba(255,255,255,0.25)';
            pctx.fill();

            // Brick outline
            pctx.strokeStyle = 'rgba(0,0,0,0.3)';
            pctx.lineWidth = 1.5;
            pctx.strokeRect(bx + 2, by + 2, cellW - 4, cellH - 4);
        }
    }

    // If we have the piece image, overlay it as a pattern
    if (pieceImgLoaded) {
        pctx.globalAlpha = 0.08;
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                pctx.drawImage(puzzlePieceImg, c*cellW, r*cellH, cellW, cellH);
            }
        }
        pctx.globalAlpha = 1;
    }

    return puzzleCanvas;
}

// ===== INIT GAME =====
function initGame() {
    if (gameState === 'menu') {
        draw();
        return;
    }
    startLevel(currentLevel);
}

function startLevel(lvlIdx) {
    const lvl = LEVELS[lvlIdx];
    const cols = lvl.cols;
    const rows = lvl.rows;

    moves = 0;
    elapsed = 0;
    score = 0;
    particles = [];
    gameState = 'playing';

    // Generate puzzle image
    const puzzleImg = generatePuzzleImage(cols, rows);

    // Calculate board dimensions
    const maxBoardW = W * 0.88;
    const maxBoardH = H * 0.42;
    const cellW = Math.min(maxBoardW / cols, maxBoardH / rows);
    const cellH = cellW;
    const boardW = cols * cellW;
    const boardH = rows * cellH;
    const boardX = (W - boardW) / 2;
    const boardY = 100;

    // Generate tab configuration
    const tabConfig = [];
    for (let r = 0; r < rows; r++) {
        tabConfig[r] = [];
        for (let c = 0; c < cols; c++) {
            tabConfig[r][c] = {
                top: r === 0 ? 0 : -tabConfig[r-1][c].bottom,
                right: c === cols-1 ? 0 : (Math.random() > 0.5 ? 1 : -1),
                bottom: r === rows-1 ? 0 : (Math.random() > 0.5 ? 1 : -1),
                left: c === 0 ? 0 : -tabConfig[r][c-1].right,
            };
        }
    }

    // Create slots
    slots = [];
    for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
            slots.push({
                row: r, col: c,
                x: boardX + c * cellW,
                y: boardY + r * cellH,
                w: cellW, h: cellH,
                tabs: tabConfig[r][c],
            });
        }
    }

    // Create pieces with puzzle image chunks
    pieces = [];
    for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
            // Extract piece image from puzzle canvas
            const pieceCanvas = document.createElement('canvas');
            const extraSpace = cellW * 0.4; // extra for tabs
            pieceCanvas.width = (cellW + extraSpace*2) * 2;
            pieceCanvas.height = (cellH + extraSpace*2) * 2;
            const pctx = pieceCanvas.getContext('2d');
            pctx.scale(2, 2);

            // Clip to jigsaw shape
            const tabs = tabConfig[r][c];
            drawJigsawPiece(pctx, extraSpace, extraSpace, cellW, cellH, tabs);
            pctx.save();
            pctx.clip();

            // Draw the portion of the puzzle image
            const srcX = c * (puzzleImg.width / cols);
            const srcY = r * (puzzleImg.height / rows);
            const srcW = puzzleImg.width / cols;
            const srcH = puzzleImg.height / rows;
            pctx.drawImage(puzzleImg, srcX, srcY, srcW, srcH, extraSpace, extraSpace, cellW, cellH);

            pctx.restore();

            // Draw piece outline
            drawJigsawPiece(pctx, extraSpace, extraSpace, cellW, cellH, tabs);
            pctx.strokeStyle = 'rgba(255,255,255,0.6)';
            pctx.lineWidth = 1.5;
            pctx.stroke();

            // Shadow
            drawJigsawPiece(pctx, extraSpace, extraSpace, cellW, cellH, tabs);
            pctx.strokeStyle = 'rgba(0,0,0,0.3)';
            pctx.lineWidth = 3;
            pctx.stroke();

            pieces.push({
                id: r * cols + c,
                row: r, col: c,
                targetX: boardX + c * cellW,
                targetY: boardY + r * cellH,
                x: 0, y: 0,
                w: cellW, h: cellH,
                extra: extraSpace,
                canvas: pieceCanvas,
                tabs: tabs,
                placed: false,
                scale: 1,
            });
        }
    }

    // Scatter pieces in tray area
    scatterPieces();

    // Start timer
    startTime = Date.now();
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        if (gameState === 'playing') {
            elapsed = Math.floor((Date.now() - startTime) / 1000);
            draw();
        }
    }, 250);

    draw();
}

function scatterPieces() {
    const trayY = H * 0.52;
    const trayH = H * 0.44;
    const trayW = W * 0.9;
    const startX = (W - trayW) / 2;

    // Shuffle
    const shuffled = [...pieces].sort(() => Math.random() - 0.5);
    const perRow = Math.ceil(Math.sqrt(shuffled.length * (trayW/trayH)));
    const perCol = Math.ceil(shuffled.length / perRow);
    const spacingX = trayW / (perRow + 1);
    const spacingY = trayH / (perCol + 1);

    shuffled.forEach((p, i) => {
        if (p.placed) return;
        const col = i % perRow;
        const row = Math.floor(i / perRow);
        p.x = startX + (col + 1) * spacingX - p.w/2 + (Math.random()-0.5)*20;
        p.y = trayY + (row + 1) * spacingY - p.h/2 + (Math.random()-0.5)*20;
    });
}

// ===== DRAWING =====
function draw() {
    ctx.clearRect(0, 0, W, H);

    // BG gradient
    const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
    bgGrad.addColorStop(0, '#0f0c29');
    bgGrad.addColorStop(0.5, '#1b1b3a');
    bgGrad.addColorStop(1, '#162447');
    ctx.fillStyle = bgGrad;
    ctx.fillRect(0, 0, W, H);

    // BG Stars
    menuAnim += 0.01;
    bgStars.forEach(s => {
        const alpha = 0.3 + 0.4 * Math.sin(menuAnim * s.s + s.a);
        ctx.beginPath();
        ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI*2);
        ctx.fillStyle = `rgba(255,255,255,${alpha})`;
        ctx.fill();
    });

    if (gameState === 'menu') drawMenu();
    else if (gameState === 'playing') drawPlaying();
    else if (gameState === 'win') drawWin();

    // Particles
    drawParticles();

    requestAnimationFrame(draw);
}

function drawMenu() {
    // Title with glow
    const titleY = H * 0.18;
    ctx.save();
    ctx.shadowColor = '#ffd93d';
    ctx.shadowBlur = 30;
    ctx.font = `bold ${Math.min(W*0.1, 48)}px 'Segoe UI'`;
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ffd93d';
    ctx.fillText('🧩 ليجو بازل', W/2, titleY);
    ctx.restore();

    // Subtitle
    ctx.font = `${Math.min(W*0.04, 18)}px 'Segoe UI'`;
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.fillText('جمّع القطع في مكانها الصحيح!', W/2, titleY + 40);

    // Draw animated puzzle piece preview
    if (pieceImgLoaded) {
        const prevW = Math.min(W * 0.5, 200);
        const prevH = prevW * (puzzlePieceImg.height / puzzlePieceImg.width);
        const bobY = Math.sin(menuAnim * 2) * 8;
        ctx.save();
        ctx.shadowColor = 'rgba(139,92,52,0.5)';
        ctx.shadowBlur = 20;
        ctx.drawImage(puzzlePieceImg, W/2 - prevW/2, H*0.28 + bobY, prevW, prevH);
        ctx.restore();
    }

    // Level buttons
    const btnW = W * 0.7;
    const btnH = 55;
    const startY = H * 0.52;
    const gap = 15;

    LEVELS.forEach((lvl, i) => {
        const bx = (W - btnW) / 2;
        const by = startY + i * (btnH + gap);
        const hover = Math.sin(menuAnim * 3 + i * 0.8) * 2;

        // Button BG
        const grad = ctx.createLinearGradient(bx, by, bx + btnW, by + btnH);
        const colors = [
            ['#27ae60','#2ecc71'], ['#f39c12','#e67e22'],
            ['#e74c3c','#c0392b'], ['#8e44ad','#9b59b6']
        ];
        grad.addColorStop(0, colors[i][0]);
        grad.addColorStop(1, colors[i][1]);

        ctx.save();
        ctx.shadowColor = colors[i][0];
        ctx.shadowBlur = 12;
        roundRect(ctx, bx, by + hover, btnW, btnH, 28);
        ctx.fillStyle = grad;
        ctx.fill();
        ctx.restore();

        // Text
        ctx.font = `bold ${Math.min(W*0.045, 20)}px 'Segoe UI'`;
        ctx.textAlign = 'center';
        ctx.fillStyle = 'white';
        ctx.fillText(`${lvl.emoji} ${lvl.name} (${lvl.cols}×${lvl.rows})`, W/2, by + hover + btnH/2 + 7);

        // Store button bounds for click detection
        lvl._bx = bx; lvl._by = by - 5; lvl._bw = btnW; lvl._bh = btnH + 10;
    });
}

function drawPlaying() {
    const lvl = LEVELS[currentLevel];

    // Header bar
    const headerGrad = ctx.createLinearGradient(0, 0, W, 70);
    headerGrad.addColorStop(0, 'rgba(15,12,41,0.95)');
    headerGrad.addColorStop(1, 'rgba(27,27,58,0.95)');
    ctx.fillStyle = headerGrad;
    ctx.fillRect(0, 0, W, 80);

    // Bottom line
    ctx.fillStyle = '#ffd93d';
    ctx.fillRect(0, 79, W, 1.5);

    // Level name
    ctx.font = `bold ${Math.min(W*0.045, 20)}px 'Segoe UI'`;
    ctx.textAlign = 'right';
    ctx.fillStyle = '#ffd93d';
    ctx.fillText(`${lvl.emoji} ${lvl.name}`, W - 15, 32);

    // Stats
    ctx.font = `bold ${Math.min(W*0.04, 17)}px 'Segoe UI'`;
    ctx.textAlign = 'right';
    const mins = String(Math.floor(elapsed/60)).padStart(2,'0');
    const secs = String(elapsed%60).padStart(2,'0');
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    ctx.fillText(`⏱ ${mins}:${secs}`, W - 15, 60);

    ctx.textAlign = 'left';
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    ctx.fillText(`🎯 ${moves} حركة`, 15, 32);

    // Placed count
    const placedCount = pieces.filter(p => p.placed).length;
    ctx.fillText(`✅ ${placedCount}/${pieces.length}`, 15, 60);

    // Draw slot outlines (target positions)
    slots.forEach(slot => {
        ctx.save();
        drawJigsawPiece(ctx, slot.x, slot.y, slot.w, slot.h, slot.tabs);
        ctx.fillStyle = 'rgba(255,255,255,0.04)';
        ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,0.15)';
        ctx.lineWidth = 1;
        ctx.setLineDash([4, 4]);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.restore();
    });

    // Tray separator
    const trayY = H * 0.5;
    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 1;
    ctx.setLineDash([8, 8]);
    ctx.beginPath();
    ctx.moveTo(15, trayY);
    ctx.lineTo(W-15, trayY);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();

    ctx.font = `${Math.min(W*0.03, 13)}px 'Segoe UI'`;
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.fillText('⬆ اسحب القطع للأعلى ⬆', W/2, trayY + 16);

    // Draw pieces (non-dragging first, then dragging on top)
    pieces.filter(p => p !== dragging).forEach(p => drawPiece(p));
    if (dragging) drawPiece(dragging);
}

function drawPiece(p) {
    if (p.placed && p !== dragging) {
        // Draw placed piece in its slot
        ctx.save();
        ctx.drawImage(p.canvas, 
            p.targetX - p.extra, p.targetY - p.extra,
            p.canvas.width/2, p.canvas.height/2);
        ctx.restore();
    } else {
        // Draw floating piece with shadow
        ctx.save();
        if (p === dragging) {
            ctx.shadowColor = 'rgba(255,217,61,0.6)';
            ctx.shadowBlur = 25;
        } else {
            ctx.shadowColor = 'rgba(0,0,0,0.5)';
            ctx.shadowBlur = 10;
        }
        const s = p === dragging ? 1.08 : 1;
        const cx = p.x + p.w/2;
        const cy = p.y + p.h/2;
        ctx.translate(cx, cy);
        ctx.scale(s, s);
        ctx.translate(-cx, -cy);
        ctx.drawImage(p.canvas,
            p.x - p.extra, p.y - p.extra,
            p.canvas.width/2, p.canvas.height/2);
        ctx.restore();
    }
}

function drawWin() {
    // Draw completed puzzle
    slots.forEach(slot => {
        const piece = pieces.find(p => p.row === slot.row && p.col === slot.col);
        if (piece) {
            ctx.drawImage(piece.canvas,
                piece.targetX - piece.extra, piece.targetY - piece.extra,
                piece.canvas.width/2, piece.canvas.height/2);
        }
    });

    // Overlay
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(0, 0, W, H);

    // Trophy
    ctx.font = `${Math.min(W*0.2, 90)}px 'Segoe UI'`;
    ctx.textAlign = 'center';
    const bobY = Math.sin(menuAnim * 3) * 10;
    ctx.fillText('🏆', W/2, H*0.3 + bobY);

    // Title
    ctx.save();
    ctx.shadowColor = '#ffd93d';
    ctx.shadowBlur = 25;
    ctx.font = `bold ${Math.min(W*0.09, 42)}px 'Segoe UI'`;
    ctx.fillStyle = '#ffd93d';
    ctx.fillText('أحسنت!', W/2, H*0.43);
    ctx.restore();

    // Stats
    ctx.font = `${Math.min(W*0.045, 20)}px 'Segoe UI'`;
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    const mins = String(Math.floor(elapsed/60)).padStart(2,'0');
    const secs = String(elapsed%60).padStart(2,'0');
    ctx.fillText(`⏱ الوقت: ${mins}:${secs}`, W/2, H*0.50);
    ctx.fillText(`🎯 الحركات: ${moves}`, W/2, H*0.56);

    // Stars
    const starStr = '⭐'.repeat(stars) + '☆'.repeat(3-stars);
    ctx.font = `${Math.min(W*0.1, 45)}px 'Segoe UI'`;
    ctx.fillText(starStr, W/2, H*0.65);

    // Score
    ctx.save();
    ctx.shadowColor = '#6bcb77';
    ctx.shadowBlur = 15;
    ctx.font = `bold ${Math.min(W*0.07, 32)}px 'Segoe UI'`;
    ctx.fillStyle = '#6bcb77';
    ctx.fillText(`النقاط: ${score}`, W/2, H*0.73);
    ctx.restore();

    // Buttons
    const btnW = W * 0.4;
    const btnH = 50;
    const btnGap = 15;

    // Next level button
    const nextX = W/2 - btnW - btnGap/2;
    const nextY = H * 0.78;
    roundRect(ctx, nextX, nextY, btnW, btnH, 25);
    ctx.fillStyle = '#27ae60';
    ctx.fill();
    ctx.font = `bold ${Math.min(W*0.04, 18)}px 'Segoe UI'`;
    ctx.fillStyle = 'white';
    ctx.fillText('التالي ➡️', nextX + btnW/2, nextY + btnH/2 + 6);

    // Menu button
    const menuX = W/2 + btnGap/2;
    roundRect(ctx, menuX, nextY, btnW, btnH, 25);
    ctx.fillStyle = '#e74c3c';
    ctx.fill();
    ctx.fillStyle = 'white';
    ctx.fillText('🏠 القائمة', menuX + btnW/2, nextY + btnH/2 + 6);

    // Store bounds
    window._winBtns = {
        next: { x: nextX, y: nextY, w: btnW, h: btnH },
        menu: { x: menuX, y: nextY, w: btnW, h: btnH },
    };
}

function drawParticles() {
    particles = particles.filter(p => p.life > 0);
    particles.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.15;
        p.life -= 0.02;
        p.r *= 0.99;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
        ctx.fillStyle = `rgba(${p.cr},${p.cg},${p.cb},${p.life})`;
        ctx.fill();
    });
}

function spawnParticles(x, y, count, color) {
    const r = parseInt(color.slice(1,3),16);
    const g = parseInt(color.slice(3,5),16);
    const b = parseInt(color.slice(5,7),16);
    for (let i = 0; i < count; i++) {
        particles.push({
            x, y,
            vx: (Math.random()-0.5)*6,
            vy: (Math.random()-1)*5,
            r: Math.random()*4+2,
            life: 1,
            cr: r, cg: g, cb: b,
        });
    }
}

// ===== UTILITY =====
function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x+r, y);
    ctx.lineTo(x+w-r, y);
    ctx.quadraticCurveTo(x+w, y, x+w, y+r);
    ctx.lineTo(x+w, y+h-r);
    ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
    ctx.lineTo(x+r, y+h);
    ctx.quadraticCurveTo(x, y+h, x, y+h-r);
    ctx.lineTo(x, y+r);
    ctx.quadraticCurveTo(x, y, x+r, y);
    ctx.closePath();
}

// ===== INPUT HANDLING =====
function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const touch = e.touches ? e.touches[0] : e;
    return { x: touch.clientX - rect.left, y: touch.clientY - rect.top };
}

function onDown(e) {
    e.preventDefault();
    const pos = getPos(e);

    if (gameState === 'menu') {
        LEVELS.forEach((lvl, i) => {
            if (pos.x >= lvl._bx && pos.x <= lvl._bx + lvl._bw &&
                pos.y >= lvl._by && pos.y <= lvl._by + lvl._bh) {
                currentLevel = i;
                startLevel(i);
                if (navigator.vibrate) navigator.vibrate(30);
            }
        });
        return;
    }

    if (gameState === 'win') {
        const btns = window._winBtns;
        if (btns) {
            if (pos.x >= btns.next.x && pos.x <= btns.next.x + btns.next.w &&
                pos.y >= btns.next.y && pos.y <= btns.next.y + btns.next.h) {
                currentLevel = (currentLevel + 1) % LEVELS.length;
                startLevel(currentLevel);
                if (navigator.vibrate) navigator.vibrate(30);
            }
            if (pos.x >= btns.menu.x && pos.x <= btns.menu.x + btns.menu.w &&
                pos.y >= btns.menu.y && pos.y <= btns.menu.y + btns.menu.h) {
                gameState = 'menu';
                if (timerInterval) clearInterval(timerInterval);
                if (navigator.vibrate) navigator.vibrate(30);
            }
        }
        return;
    }

    if (gameState === 'playing') {
        // Find topmost unplaced piece under touch
        for (let i = pieces.length - 1; i >= 0; i--) {
            const p = pieces[i];
            if (p.placed) continue;
            if (pos.x >= p.x && pos.x <= p.x + p.w &&
                pos.y >= p.y && pos.y <= p.y + p.h) {
                dragging = p;
                dragOffX = pos.x - p.x;
                dragOffY = pos.y - p.y;
                // Move to top
                pieces.splice(i, 1);
                pieces.push(p);
                if (navigator.vibrate) navigator.vibrate(20);
                break;
            }
        }
    }
}

function onMove(e) {
    e.preventDefault();
    if (!dragging) return;
    const pos = getPos(e);
    dragging.x = pos.x - dragOffX;
    dragging.y = pos.y - dragOffY;
}

function onUp(e) {
    e.preventDefault();
    if (!dragging) return;

    // Check if close to target
    const dx = dragging.x - dragging.targetX;
    const dy = dragging.y - dragging.targetY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const snapDist = dragging.w * 0.45;

    if (dist < snapDist) {
        dragging.placed = true;
        dragging.x = dragging.targetX;
        dragging.y = dragging.targetY;
        moves++;

        spawnParticles(dragging.targetX + dragging.w/2, dragging.targetY + dragging.h/2, 15, '#ffd93d');
        if (navigator.vibrate) navigator.vibrate([30, 40, 30]);

        // Check win
        if (pieces.every(p => p.placed)) {
            winGame();
        }
    } else {
        moves++;
    }

    dragging = null;
}

function winGame() {
    gameState = 'win';
    if (timerInterval) clearInterval(timerInterval);

    const totalPieces = pieces.length;
    const optimalMoves = totalPieces;
    stars = 3;
    if (moves > optimalMoves * 1.5) stars = 2;
    if (moves > optimalMoves * 2.5) stars = 1;

    score = Math.max(0, totalPieces * 150 - moves * 5 - elapsed * 2);

    // Spawn lots of confetti particles
    const colors = ['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#9b59b6','#fd79a8'];
    for (let i = 0; i < 80; i++) {
        setTimeout(() => {
            const c = colors[Math.floor(Math.random()*colors.length)];
            spawnParticles(Math.random()*W, Math.random()*H*0.3, 3, c);
        }, i * 30);
    }

    if (navigator.vibrate) navigator.vibrate([100,50,100,50,200]);

    // Send to telegram
    if (tg) {
        tg.sendData(JSON.stringify({ score, level: currentLevel, moves, time: elapsed, stars }));
    }
}

// Events
canvas.addEventListener('mousedown', onDown);
canvas.addEventListener('mousemove', onMove);
canvas.addEventListener('mouseup', onUp);
canvas.addEventListener('touchstart', onDown, { passive: false });
canvas.addEventListener('touchmove', onMove, { passive: false });
canvas.addEventListener('touchend', onUp, { passive: false });

// Start
draw();
</script>
</body>
