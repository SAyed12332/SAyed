<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GG Script Maker Pro</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Tajawal', sans-serif;
  background-color: var(--tg-theme-bg-color, #ffffff);
  color: var(--tg-theme-text-color, #000000);
  min-height: 100vh;
  padding: 0 0 40px;
}

.header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 16px 16px 12px;
  animation: fadeUp .4s ease both;
}
.title { font-size: 20px; font-weight: 800; color: var(--tg-theme-button-color, #2AABEE); }
.lang-badge {
  display: inline-flex; align-items: center; gap: 4px;
  margin-top: 4px; font-size: 11px; font-weight: 700;
  padding: 3px 10px; border-radius: 20px;
  background: color-mix(in srgb, var(--tg-theme-button-color,#2AABEE) 12%, transparent);
  color: var(--tg-theme-button-color, #2AABEE);
  border: 1px solid color-mix(in srgb, var(--tg-theme-button-color,#2AABEE) 25%, transparent);
}
.btn-theme {
  width: 38px; height: 38px; border-radius: 50%;
  background: var(--tg-theme-secondary-bg-color, #f4f4f5);
  border: none; font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: .15s;
}
.btn-theme:active { transform: scale(.9); }

.card {
  background: var(--tg-theme-secondary-bg-color, #f4f4f5);
  border-radius: 18px; padding: 14px;
  margin: 0 16px 16px;
  animation: fadeUp .5s ease both;
}
.card-label {
  font-size: 11px; font-weight: 700; letter-spacing: .6px;
  text-transform: uppercase;
  color: var(--tg-theme-hint-color, #999);
  display: block; margin-bottom: 10px;
}

input, textarea {
  width: 100%; padding: 11px 13px;
  border-radius: 12px; margin-bottom: 8px;
  border: 1.5px solid rgba(128,128,128,0.15);
  background: var(--tg-theme-bg-color, #fff);
  color: var(--tg-theme-text-color, #000);
  font-family: 'Tajawal', sans-serif; font-size: 14px;
  outline: none; transition: border-color .2s;
}
input:focus, textarea:focus { border-color: var(--tg-theme-button-color, #2AABEE); }
input::placeholder, textarea::placeholder { color: var(--tg-theme-hint-color, #aaa); }
input:last-child { margin-bottom: 0; }

textarea#editor {
  height: 200px; resize: none;
  font-family: monospace; direction: ltr; font-size: 13px; line-height: 1.6;
  border: 2px solid var(--tg-theme-button-color, #2AABEE);
  margin-bottom: 0;
}

.btn {
  background: var(--tg-theme-button-color, #2AABEE);
  color: var(--tg-theme-button-text-color, #fff);
  border: none; padding: 11px 14px; border-radius: 12px;
  font-family: 'Tajawal', sans-serif; font-size: 13px; font-weight: 700;
  cursor: pointer; transition: .2s; width: 100%;
}
.btn:active { transform: scale(.96); opacity: .85; }
.btn-red   { background: #FF3B30; color: #fff; }
.btn-green { background: #34C759; color: #fff; }
.btn-neutral {
  background: var(--tg-theme-bg-color, #fff);
  color: var(--tg-theme-text-color, #000);
  border: 1.5px solid rgba(128,128,128,0.2);
}

.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }

.tools-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.tool-btn {
  background: var(--tg-theme-bg-color, #fff);
  border: 1.5px solid rgba(128,128,128,0.12);
  border-radius: 14px; padding: 12px 8px;
  cursor: pointer; transition: .18s;
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  font-family: 'Tajawal', sans-serif; color: var(--tg-theme-text-color, #000);
}
.tool-btn:active {
  transform: scale(.94);
  background: color-mix(in srgb, var(--tg-theme-button-color,#2AABEE) 10%, transparent);
}
.tool-icon  { font-size: 22px; }
.tool-label { font-size: 12px; font-weight: 700; }
.tool-desc  { font-size: 10px; color: var(--tg-theme-hint-color, #999); }

.btn-send {
  font-size: 15px; padding: 14px;
  margin: 0 16px; width: calc(100% - 32px);
  animation: fadeUp .6s ease both;
}

@keyframes fadeUp { from{opacity:0;transform:translateY(15px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div>
    <div class="title" id="el_title">صانع سكربتات GG</div>
    <div class="lang-badge" id="el_langBadge">🌍</div>
  </div>
  <button class="btn-theme" id="themeBtn" onclick="toggleTheme()">🌙</button>
</div>

<!-- SETTINGS -->
<div class="card" style="animation-delay:.05s">
  <span class="card-label" id="el_lblSettings">إعدادات السكربت</span>
  <input id="scriptName"   placeholder="اسم السكربت">
  <input id="scriptPass"   placeholder="كلمة مرور (اختياري)">
  <input id="scriptAuthor" placeholder="اسم المطور (اختياري)">
</div>

<!-- TOOLS -->
<div class="card" style="animation-delay:.1s">
  <span class="card-label" id="el_lblTools">أدوات البرمجة</span>
  <div class="tools-grid" id="toolsGrid"></div>
</div>

<!-- EDITOR -->
<div class="card" style="animation-delay:.15s">
  <span class="card-label" id="el_lblEditor">محرر الكود</span>
  <textarea id="editor" placeholder="-- اكتب كود Lua هنا..."></textarea>
  <div class="grid">
    <button class="btn btn-red"     id="el_btnClear" onclick="clearEditor()">❌ مسح</button>
    <button class="btn btn-neutral" id="el_btnSave"  onclick="downloadFile()">💾 حفظ</button>
  </div>
</div>

<!-- SEND -->
<button class="btn btn-green btn-send" id="el_btnSend" onclick="sendToBot()">🚀 إرسال الملف للبوت</button>

<script>
// ════════════════════════════════════════
//  ⬇️  ضع التوكن هنا
// ════════════════════════════════════════
const BOT_TOKEN = "ضع_التوكن_هنا";

// ════════════════════════════════════════
//  TRANSLATIONS
// ════════════════════════════════════════
const T = {
  ar: {
    title:       "صانع سكربتات GG",
    langBadge:   "🇸🇦 اللغة: العربية",
    lblSettings: "إعدادات السكربت",
    lblTools:    "أدوات البرمجة",
    lblEditor:   "محرر الكود",
    phName:      "اسم السكربت (مثال: Sayed_Hack)",
    phPass:      "كلمة مرور (اختياري)",
    phAuthor:    "اسم المطور (اختياري)",
    phEditor:    "-- اكتب كود Lua هنا...",
    btnClear:    "❌ مسح",
    btnSave:     "💾 حفظ",
    btnSend:     "🚀 إرسال الملف للبوت",
    confirmClear:"هل تريد مسح كل الكود؟",
    alertSaved:  "✅ تم حفظ الملف!",
    alertSent:   "🚀 تم إرسال السكربت بنجاح!",
    alertFail:   "❌ فشل الإرسال. تأكد أنك بدأت محادثة مع البوت.",
    alertErr:    "⚠️ خطأ في الاتصال.",
    alertEmpty:  "⚠️ الكود فارغ!",
    alertNoUser: "افتح التطبيق من داخل تيليجرام.",
    pSearch:     "الرقم للبحث عنه:",
    pType:       "نوع البيانات (4=DWORD, 16=FLOAT):",
    pEditVal:    "القيمة الجديدة:",
    pAlertMsg:   "نص التنبيه:",
    pToastMsg:   "نص الإشعار:",
    pSleep:      "مدة الانتظار (ثانية):",
    okBtn:       "موافق",
    wrongPass:   "رمز خاطئ",
    passLabel:   "كلمة المرور:",
    tools: [
      {icon:"🔍", label:"بحث",        desc:"searchNumber", fn:"askSearch"},
      {icon:"✍️", label:"تعديل",      desc:"editAll",      fn:"askEdit"},
      {icon:"💬", label:"Alert",       desc:"رسالة",        fn:"askAlert"},
      {icon:"🍞", label:"Toast",       desc:"إشعار",        fn:"askToast"},
      {icon:"📋", label:"Prompt",      desc:"إدخال",        fn:"askPrompt"},
      {icon:"☑️", label:"قائمة",       desc:"multiChoice",  fn:"askMulti"},
      {icon:"🌐", label:"النطاق",      desc:"setRanges",    fn:"askRanges"},
      {icon:"🗑️", label:"مسح",        desc:"clearResults", fn:"addClear"},
      {icon:"⏱",  label:"Sleep",       desc:"تأخير",        fn:"askSleep"},
      {icon:"🔒", label:"حماية",       desc:"password",     fn:"addPass"},
      {icon:"🔁", label:"Loop",        desc:"while",        fn:"addWhile"},
      {icon:"🚪", label:"خروج",        desc:"os.exit",      fn:"addExit"},
    ]
  },
  en: {
    title:       "GG Script Maker Pro",
    langBadge:   "🇺🇸 Language: English",
    lblSettings: "Script Settings",
    lblTools:    "Smart Tools",
    lblEditor:   "Code Editor",
    phName:      "Script Name (e.g. Sayed_Hack)",
    phPass:      "Password (optional)",
    phAuthor:    "Developer Name (optional)",
    phEditor:    "-- Write Lua code here...",
    btnClear:    "❌ Clear",
    btnSave:     "💾 Save",
    btnSend:     "🚀 Send File to Bot",
    confirmClear:"Clear all code?",
    alertSaved:  "✅ File saved!",
    alertSent:   "🚀 Script sent successfully!",
    alertFail:   "❌ Send failed. Start a chat with the bot first.",
    alertErr:    "⚠️ Connection error.",
    alertEmpty:  "⚠️ Code is empty!",
    alertNoUser: "Open the app from inside Telegram.",
    pSearch:     "Number to search:",
    pType:       "Data type (4=DWORD, 16=FLOAT):",
    pEditVal:    "New value:",
    pAlertMsg:   "Alert message:",
    pToastMsg:   "Toast text:",
    pSleep:      "Delay (seconds):",
    okBtn:       "OK",
    wrongPass:   "Wrong code",
    passLabel:   "Password:",
    tools: [
      {icon:"🔍", label:"Search",      desc:"searchNumber", fn:"askSearch"},
      {icon:"✍️", label:"Edit All",    desc:"editAll",      fn:"askEdit"},
      {icon:"💬", label:"Alert",       desc:"message",      fn:"askAlert"},
      {icon:"🍞", label:"Toast",       desc:"notification", fn:"askToast"},
      {icon:"📋", label:"Prompt",      desc:"input",        fn:"askPrompt"},
      {icon:"☑️", label:"Menu",        desc:"multiChoice",  fn:"askMulti"},
      {icon:"🌐", label:"Ranges",      desc:"setRanges",    fn:"askRanges"},
      {icon:"🗑️", label:"Clear",       desc:"clearResults", fn:"addClear"},
      {icon:"⏱",  label:"Sleep",       desc:"delay",        fn:"askSleep"},
      {icon:"🔒", label:"Protect",     desc:"password",     fn:"addPass"},
      {icon:"🔁", label:"Loop",        desc:"while",        fn:"addWhile"},
      {icon:"🚪", label:"Exit",        desc:"os.exit",      fn:"addExit"},
    ]
  }
};

// ════════════════════════════════════════
//  GLOBALS
// ════════════════════════════════════════
const tg = window.Telegram?.WebApp;
let lang = "ar";
let tr   = T.ar;

// ════════════════════════════════════════
//  INIT — كشف اللغة من المتصفح مباشرة
// ════════════════════════════════════════
function init() {
  if (tg) { tg.ready(); tg.expand(); }

  // navigator.language يعكس لغة تطبيق تيليجرام الحالية فعلاً
  const code = navigator.language || navigator.userLanguage || "ar";
  lang = code.startsWith("ar") ? "ar" : "en";
  tr   = T[lang];

  document.documentElement.dir  = lang === "ar" ? "rtl" : "ltr";
  document.documentElement.lang = lang;

  applyUI();
  renderTools();
}

function applyUI() {
  document.getElementById("el_title").textContent      = tr.title;
  document.getElementById("el_langBadge").textContent  = tr.langBadge;
  document.getElementById("el_lblSettings").textContent= tr.lblSettings;
  document.getElementById("el_lblTools").textContent   = tr.lblTools;
  document.getElementById("el_lblEditor").textContent  = tr.lblEditor;
  document.getElementById("el_btnClear").textContent   = tr.btnClear;
  document.getElementById("el_btnSave").textContent    = tr.btnSave;
  document.getElementById("el_btnSend").textContent    = tr.btnSend;
  document.getElementById("scriptName").placeholder    = tr.phName;
  document.getElementById("scriptPass").placeholder    = tr.phPass;
  document.getElementById("scriptAuthor").placeholder  = tr.phAuthor;
  document.getElementById("editor").placeholder        = tr.phEditor;
}

function renderTools() {
  document.getElementById("toolsGrid").innerHTML = tr.tools.map(t => `
    <button class="tool-btn" onclick="${t.fn}()">
      <div class="tool-icon">${t.icon}</div>
      <div class="tool-label">${t.label}</div>
      <div class="tool-desc">${t.desc}</div>
    </button>`
  ).join("");
}

// ════════════════════════════════════════
//  THEME
// ════════════════════════════════════════
function toggleTheme() {
  const btn = document.getElementById("themeBtn");
  btn.textContent = btn.textContent === "🌙" ? "☀️" : "🌙";
  haptic("light");
}

// ════════════════════════════════════════
//  CODE
// ════════════════════════════════════════
function addCode(code) {
  const ed = document.getElementById("editor");
  ed.value += (ed.value.trim() ? "\n" : "") + code;
  haptic("light");
}

function buildCode() {
  const name   = document.getElementById("scriptName").value.trim()   || "MyScript";
  const pass   = document.getElementById("scriptPass").value.trim();
  const author = document.getElementById("scriptAuthor").value.trim();
  const body   = document.getElementById("editor").value.trim();

  let c = `-- Script: ${name}\n`;
  if (author) c += `-- Author: ${author}\n`;
  c += `-- Built with GG Script Maker Pro\n\n`;
  if (pass) {
    c += `local _p = gg.prompt({'${tr.passLabel}'},{''}, {'text'})\n`;
    c += `if _p == nil or _p[1] ~= '${pass}' then\n`;
    c += `  gg.alert("${tr.wrongPass}")\n  os.exit()\nend\n\n`;
  }
  c += body;
  return { code: c, name };
}

// ════════════════════════════════════════
//  TOOLS
// ════════════════════════════════════════
function askSearch() {
  const v = prompt(tr.pSearch, "100"); if (!v) return;
  const t = prompt(tr.pType, "4");     if (!t) return;
  addCode(`gg.searchNumber("${v}", ${t})`);
}
function askEdit() {
  const v = prompt(tr.pEditVal, "99999"); if (!v) return;
  const t = prompt(tr.pType, "4");        if (!t) return;
  addCode(`gg.editAll("${v}", ${t})`);
}
function askAlert() {
  const m = prompt(tr.pAlertMsg, lang==="ar"?"أهلاً":"Hello");
  if (m) addCode(`gg.alert("${m}", "${tr.okBtn}")`);
}
function askToast() {
  const m = prompt(tr.pToastMsg, lang==="ar"?"تم التفعيل":"Activated");
  if (m) addCode(`gg.toast("${m}")`);
}
function askPrompt() {
  addCode(`local p = gg.prompt(\n  {'${lang==="ar"?"أدخل القيمة:":"Enter value:"}'},\n  {'100'}, {'number'}\n)\nif p == nil then return end\ngg.searchNumber(p[1], 4)`);
}
function askMulti() {
  addCode(`local m = gg.multiChoice({\n  '${lang==="ar"?"خيار 1":"Option 1"}',\n  '${lang==="ar"?"خيار 2":"Option 2"}',\n  '${lang==="ar"?"خروج":"Exit"}'\n})\nif m == nil then return end\nif m[3] then os.exit() end`);
}
function askRanges() { addCode(`gg.setRanges(gg.REGION_ANONYMOUS | gg.REGION_C_ALLOC)`); }
function addClear()  { addCode(`gg.clearResults()`); }
function askSleep() {
  const s = prompt(tr.pSleep, "1");
  if (s) addCode(`gg.sleep(${Math.round(parseFloat(s) * 1000)})`);
}
function addPass() {
  addCode(`local _p = gg.prompt({'${tr.passLabel}'},{''}, {'text'})\nif _p == nil or _p[1] ~= 'MyPass' then\n  gg.alert("${tr.wrongPass}")\n  os.exit()\nend`);
}
function addWhile() {
  addCode(`while true do\n  -- ${lang==="ar"?"الكود هنا":"code here"}\n  gg.sleep(1000)\nend`);
}
function addExit() { addCode(`os.exit()`); }

// ════════════════════════════════════════
//  ACTIONS
// ════════════════════════════════════════
function clearEditor() {
  tgConfirm(tr.confirmClear, ok => {
    if (ok) { document.getElementById("editor").value = ""; hapticNotif("warning"); }
  });
}

function downloadFile() {
  const { code, name } = buildCode();
  if (!document.getElementById("editor").value.trim()) { tgAlert(tr.alertEmpty); return; }
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([code], { type: "text/lua" }));
  a.download = `${name}.lua`;
  a.click();
  tgAlert(tr.alertSaved);
  hapticNotif("success");
}

async function sendToBot() {
  const user = tg?.initDataUnsafe?.user;
  if (!user?.id) { tgAlert(tr.alertNoUser); return; }
  if (!document.getElementById("editor").value.trim()) { tgAlert(tr.alertEmpty); return; }

  const { code, name } = buildCode();
  hapticNotif("success");

  const file = new File([new Blob([code], { type: "text/plain" })], `${name}.lua`);
  const fd = new FormData();
  fd.append("chat_id", user.id);
  fd.append("document", file);
  fd.append("caption", `✅ ${name}.lua\n👤 ${user.first_name}`);

  try {
    const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendDocument`, { method: "POST", body: fd });
    tgAlert(res.ok ? tr.alertSent : tr.alertFail);
    hapticNotif(res.ok ? "success" : "error");
  } catch {
    tgAlert(tr.alertErr);
    hapticNotif("error");
  }
}

// ════════════════════════════════════════
//  TG HELPERS
// ════════════════════════════════════════
function tgAlert(msg)       { tg?.showAlert   ? tg.showAlert(msg)      : alert(msg); }
function tgConfirm(msg, cb) { tg?.showConfirm ? tg.showConfirm(msg,cb) : cb(confirm(msg)); }
function haptic(t)          { tg?.HapticFeedback?.impactOccurred(t); }
function hapticNotif(t)     { tg?.HapticFeedback?.notificationOccurred(t); }

init();
</script>
</body>
</html>
