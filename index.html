<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GG Control Panel</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #06090f;
  --cyan:    #00d4ff;
  --green:   #00ff9d;
  --red:     #ff4060;
  --yellow:  #ffd700;
  --purple:  #b57aff;
  --text:    #e2e8f0;
  --muted:   #4a5568;
  --border:  rgba(0,212,255,0.15);
  --glow-c:  rgba(0,212,255,0.45);
  --glow-g:  rgba(0,255,157,0.45);
  --glow-r:  rgba(255,64,96,0.5);
  --glow-y:  rgba(255,215,0,0.4);
  --card-bg: rgba(10,15,28,0.92);
  --radius:  16px;
}
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
body {
  font-family:'Tajawal',sans-serif;
  background:var(--bg); color:var(--text);
  min-height:100vh; padding-bottom:70px;
  overflow-x:hidden; position:relative;
}
.bg-orb { position:fixed; border-radius:50%; pointer-events:none; z-index:0; filter:blur(80px); }
.orb1 { width:360px; height:360px; top:-90px; right:-80px;
  background:radial-gradient(circle,rgba(0,212,255,0.12),transparent);
  animation:orbA 11s ease-in-out infinite; }
.orb2 { width:290px; height:290px; bottom:90px; left:-60px;
  background:radial-gradient(circle,rgba(0,255,157,0.08),transparent);
  animation:orbB 13s ease-in-out infinite; }
@keyframes orbA { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-18px,28px)} }
@keyframes orbB { 0%,100%{transform:translate(0,0)} 50%{transform:translate(14px,-22px)} }
body::after {
  content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
  background-image:
    linear-gradient(rgba(0,212,255,0.018) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,212,255,0.018) 1px,transparent 1px);
  background-size:40px 40px;
}
.scanline {
  position:fixed; inset:0; z-index:1; pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.04) 2px,rgba(0,0,0,0.04) 4px);
}
.content { position:relative; z-index:2; }

/* HEADER */
.header {
  display:flex; align-items:center; justify-content:space-between;
  padding:18px 16px 12px;
  opacity:0; animation:slideDown .5s cubic-bezier(.22,1,.36,1) .05s both;
}
@keyframes slideDown { to{opacity:1;transform:translateY(0)} from{opacity:0;transform:translateY(-12px)} }
.title {
  font-size:22px; font-weight:900;
  background:linear-gradient(110deg,var(--cyan) 0%,var(--green) 60%,#fff 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text; filter:drop-shadow(0 0 12px rgba(0,212,255,0.3));
}
.title-sub { font-size:9px; font-family:'JetBrains Mono',monospace; color:var(--muted); letter-spacing:1.5px; margin-top:3px; }
.header-actions { display:flex; gap:8px; align-items:center; }
.hdr-btn {
  height:36px; border-radius:10px;
  background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08);
  cursor:pointer; transition:all .2s cubic-bezier(.22,1,.36,1);
  display:flex; align-items:center; justify-content:center;
  color:var(--text); font-family:'JetBrains Mono',monospace;
  font-size:11px; font-weight:700; letter-spacing:.5px;
  position:relative; overflow:hidden; padding:0 12px; gap:6px;
}
.hdr-btn img { width:15px; height:15px; }
.hdr-btn:active { transform:scale(.88); background:rgba(255,255,255,0.08); }
.lang-flag { font-size:14px; line-height:1; }

/* STATUS CARD */
.status-card {
  margin:0 16px 14px; padding:13px 16px;
  border-radius:var(--radius); background:var(--card-bg);
  border:1px solid var(--border); backdrop-filter:blur(14px);
  display:flex; align-items:center; justify-content:space-between;
  position:relative; overflow:hidden;
  opacity:0; animation:cardUp .5s cubic-bezier(.22,1,.36,1) .1s both;
}
.status-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg,transparent,var(--cyan),var(--green),transparent); opacity:.6;
}
.status-left { display:flex; align-items:center; gap:12px; }
.status-dot {
  width:12px; height:12px; border-radius:50%; flex-shrink:0;
  transition:all .5s cubic-bezier(.22,1,.36,1); position:relative;
}
.status-dot::after {
  content:''; position:absolute; inset:-5px; border-radius:50%;
  opacity:0; transition:opacity .5s;
}
.status-dot.online {
  background:var(--green);
  box-shadow:0 0 12px var(--green),0 0 25px rgba(0,255,157,0.4);
  animation:pulseOnline 2.2s infinite;
}
.status-dot.online::after {
  background:radial-gradient(circle,rgba(0,255,157,0.3),transparent);
  opacity:1; animation:pingRipple 2.2s infinite;
}
.status-dot.offline { background:var(--red); box-shadow:0 0 10px var(--red); }
@keyframes pulseOnline { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.7;transform:scale(.8)} }
@keyframes pingRipple { 0%{transform:scale(1);opacity:.6} 100%{transform:scale(3);opacity:0} }
.status-label { font-size:12px; font-family:'JetBrains Mono',monospace; font-weight:700; letter-spacing:.8px; transition:color .4s; }
.status-label.online  { color:var(--green); }
.status-label.offline { color:var(--red); }
.status-sub { font-size:10px; color:var(--muted); margin-top:2px; font-family:'JetBrains Mono',monospace; }
.status-result {
  font-size:11px; font-family:'JetBrains Mono',monospace;
  color:var(--cyan); max-width:130px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  background:rgba(0,212,255,0.06); border:1px solid rgba(0,212,255,0.15);
  padding:4px 9px; border-radius:8px;
}

/* CARD */
.card {
  margin:0 16px 14px; background:var(--card-bg);
  border:1px solid var(--border); border-radius:var(--radius); padding:14px;
  backdrop-filter:blur(14px);
  box-shadow:0 6px 30px rgba(0,0,0,0.35),inset 0 1px 0 rgba(255,255,255,0.04);
  position:relative; overflow:hidden;
  opacity:0; transform:translateY(16px) scale(.98);
}
.card.revealed { animation:cardUp .55s cubic-bezier(.22,1,.36,1) both; }
@keyframes cardUp { to{opacity:1;transform:translateY(0) scale(1)} }
.card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg,transparent,var(--cyan),transparent); opacity:.35;
}
.card-header { display:flex; align-items:center; gap:10px; margin-bottom:13px; }
.card-icon {
  width:32px; height:32px; border-radius:10px;
  background:rgba(0,212,255,0.08); border:1px solid rgba(0,212,255,0.18);
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
  filter:drop-shadow(0 0 8px rgba(0,212,255,0.35)); transition:filter .3s;
}
.card:hover .card-icon { filter:drop-shadow(0 0 14px rgba(0,212,255,0.7)); }
.card-icon img { width:17px; height:17px; }
.card-title { font-size:12px; font-weight:800; color:var(--cyan); font-family:'JetBrains Mono',monospace; letter-spacing:.7px; text-transform:uppercase; }
.card-desc { font-size:10px; color:var(--muted); margin-top:2px; }

/* INPUT */
input[type="text"],input[type="number"] {
  width:100%; padding:11px 14px; border-radius:11px; margin-bottom:9px;
  border:1px solid rgba(255,255,255,0.07);
  background:rgba(255,255,255,0.03);
  color:var(--text); font-family:'Tajawal',sans-serif; font-size:14px;
  outline:none; transition:all .25s cubic-bezier(.22,1,.36,1); -webkit-appearance:none;
}
input:focus {
  border-color:rgba(0,212,255,0.5); background:rgba(0,212,255,0.04);
  box-shadow:0 0 0 3px rgba(0,212,255,0.1),0 0 20px rgba(0,212,255,0.08);
  transform:translateY(-1px);
}
input::placeholder { color:var(--muted); }

/* TYPE BTNS */
.type-row { display:flex; gap:5px; overflow-x:auto; padding-bottom:2px; margin-bottom:10px; scrollbar-width:none; }
.type-row::-webkit-scrollbar { display:none; }
.type-btn {
  flex-shrink:0; padding:6px 12px; border-radius:8px; cursor:pointer;
  font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:700;
  background:rgba(255,255,255,0.04); color:var(--muted);
  border:1px solid rgba(255,255,255,0.07);
  transition:all .2s cubic-bezier(.22,1,.36,1); position:relative; overflow:hidden;
}
.type-btn.active {
  background:rgba(0,212,255,0.12); color:var(--cyan);
  border-color:rgba(0,212,255,0.35); box-shadow:0 0 10px rgba(0,212,255,0.2);
}
.type-btn:active { transform:scale(.88); }

/* EXEC BTN */
.exec-btn {
  width:100%; padding:12px; border-radius:12px; border:none; cursor:pointer;
  font-family:'Tajawal',sans-serif; font-size:14px; font-weight:800;
  display:flex; align-items:center; justify-content:center; gap:8px;
  position:relative; overflow:hidden;
  transition:all .2s cubic-bezier(.22,1,.36,1);
  -webkit-tap-highlight-color:transparent;
}
.exec-btn img { width:17px; height:17px; transition:transform .25s; }
.exec-btn:active img { transform:scale(1.2) rotate(-8deg); }

/* Ripple layer */
.exec-btn .ripple-layer {
  position:absolute; inset:0; border-radius:inherit; overflow:hidden; pointer-events:none;
}
.exec-btn .ripple-layer span {
  position:absolute; border-radius:50%; transform:scale(0); opacity:.3;
  background:rgba(255,255,255,0.5); animation:rippleAnim .55s cubic-bezier(.22,1,.36,1) forwards;
}
@keyframes rippleAnim { to{transform:scale(4.5);opacity:0} }

.btn-cyan   { background:linear-gradient(135deg,rgba(0,212,255,0.15),rgba(0,212,255,0.07)); color:var(--cyan);   border:1px solid rgba(0,212,255,0.3); }
.btn-cyan:active   { box-shadow:0 0 28px var(--glow-c),inset 0 0 18px rgba(0,212,255,0.1); transform:scale(.97); }
.btn-green  { background:linear-gradient(135deg,rgba(0,255,157,0.15),rgba(0,255,157,0.06)); color:var(--green);  border:1px solid rgba(0,255,157,0.3); }
.btn-green:active  { box-shadow:0 0 28px var(--glow-g),inset 0 0 18px rgba(0,255,157,0.1); transform:scale(.97); }
.btn-red    { background:linear-gradient(135deg,rgba(255,64,96,0.15),rgba(255,64,96,0.06)); color:var(--red);    border:1px solid rgba(255,64,96,0.3); }
.btn-red:active    { box-shadow:0 0 26px var(--glow-r),inset 0 0 16px rgba(255,64,96,0.1); transform:scale(.97); }
.btn-yellow { background:linear-gradient(135deg,rgba(255,215,0,0.13),rgba(255,215,0,0.05)); color:var(--yellow); border:1px solid rgba(255,215,0,0.28); }
.btn-yellow:active { box-shadow:0 0 22px var(--glow-y),inset 0 0 15px rgba(255,215,0,0.1); transform:scale(.97); }

/* ═══ EF CARD (EDIT + FREEZE MERGED) ═══ */
.ef-tabs {
  display:flex; gap:5px; margin-bottom:12px;
  background:rgba(255,255,255,0.03); border-radius:11px; padding:4px;
  border:1px solid rgba(255,255,255,0.06);
}
.ef-tab {
  flex:1; padding:8px; border-radius:8px; border:none; cursor:pointer;
  font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:700;
  background:transparent; color:var(--muted); letter-spacing:.5px;
  transition:all .22s cubic-bezier(.22,1,.36,1);
  display:flex; align-items:center; justify-content:center; gap:5px;
  -webkit-tap-highlight-color:transparent;
}
.ef-tab img { width:13px; height:13px; }
.ef-tab.active { color:var(--cyan); background:rgba(0,212,255,0.12); box-shadow:0 0 12px rgba(0,212,255,0.2); border:1px solid rgba(0,212,255,0.25); }
.ef-tab.active.ftab { color:var(--yellow); background:rgba(255,215,0,0.1); box-shadow:0 0 12px rgba(255,215,0,0.2); border-color:rgba(255,215,0,0.25); }
.ef-tab:active { transform:scale(.91); }

.ef-panel { display:none; }
.ef-panel.active { display:block; animation:panelIn .3s cubic-bezier(.22,1,.36,1) both; }
@keyframes panelIn { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }

/* Freeze toggle */
.freeze-toggle {
  display:flex; align-items:center; justify-content:space-between;
  background:rgba(255,215,0,0.04); border:1px solid rgba(255,215,0,0.1);
  border-radius:11px; padding:10px 13px; margin-bottom:9px;
  cursor:pointer; transition:all .25s cubic-bezier(.22,1,.36,1); user-select:none;
}
.freeze-toggle:active { transform:scale(.98); }
.freeze-toggle.on { background:rgba(255,215,0,0.1); border-color:rgba(255,215,0,0.35); box-shadow:0 0 16px rgba(255,215,0,0.15); }
.freeze-toggle-label { display:flex; align-items:center; gap:8px; font-size:13px; font-weight:700; color:var(--muted); transition:color .25s; }
.freeze-toggle.on .freeze-toggle-label { color:var(--yellow); }
.freeze-toggle-label img { width:15px; height:15px; }
.tgl-sw {
  width:44px; height:24px; border-radius:12px;
  background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.1);
  position:relative; transition:all .3s cubic-bezier(.22,1,.36,1); flex-shrink:0;
}
.tgl-sw::after {
  content:''; position:absolute; top:3px;
  width:16px; height:16px; border-radius:50%;
  background:var(--muted); transition:all .3s cubic-bezier(.22,1,.36,1);
  box-shadow:0 1px 4px rgba(0,0,0,0.4);
}
html[dir="rtl"] .tgl-sw::after { right:3px; }
html[dir="ltr"] .tgl-sw::after { left:3px; }
.freeze-toggle.on .tgl-sw { background:rgba(255,215,0,0.3); border-color:rgba(255,215,0,0.5); box-shadow:0 0 10px rgba(255,215,0,0.3); }
.freeze-toggle.on .tgl-sw::after {
  background:var(--yellow); box-shadow:0 0 8px rgba(255,215,0,0.7);
}
html[dir="rtl"] .freeze-toggle.on .tgl-sw::after { right:auto; left:3px; }
html[dir="ltr"] .freeze-toggle.on .tgl-sw::after { left:auto; right:3px; }

.freeze-btns { display:grid; grid-template-columns:1fr 1fr; gap:7px; margin-bottom:9px; }

/* QUICK */
.quick-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }
.quick-btn {
  padding:11px 6px; border-radius:12px; border:none; cursor:pointer;
  font-family:'Tajawal',sans-serif; font-size:12px; font-weight:800;
  display:flex; flex-direction:column; align-items:center; gap:6px;
  position:relative; overflow:hidden;
  transition:all .2s cubic-bezier(.22,1,.36,1);
  -webkit-tap-highlight-color:transparent;
}
.quick-btn img { width:20px; height:20px; transition:transform .2s; }
.quick-btn:active { transform:scale(.91); }
.quick-btn:active img { transform:scale(1.2) rotate(-6deg); }

/* RANGES */
.ranges-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.range-btn {
  padding:11px; border-radius:11px; cursor:pointer;
  background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.07);
  font-family:'JetBrains Mono',monospace; font-size:10px; font-weight:700;
  color:var(--text); display:flex; flex-direction:column; align-items:center; gap:3px;
  transition:all .22s cubic-bezier(.22,1,.36,1); position:relative; overflow:hidden;
}
.range-btn span { font-size:9px; color:var(--muted); font-weight:400; }
.range-btn:active { transform:scale(.92); border-color:var(--cyan); box-shadow:0 0 14px var(--glow-c); color:var(--cyan); background:rgba(0,212,255,0.08); }

/* SKELETON */
.skeleton {
  background:linear-gradient(90deg,rgba(255,255,255,0.04) 25%,rgba(255,255,255,0.09) 50%,rgba(255,255,255,0.04) 75%);
  background-size:200% 100%; animation:shimmer 1.6s infinite; border-radius:10px;
}
@keyframes shimmer { to{background-position:-200% 0} }
.sk-line { height:12px; margin-bottom:8px; }
.sk-btn  { height:44px; border-radius:12px; }
.sk-card {
  margin:0 16px 14px; background:var(--card-bg);
  border:1px solid var(--border); border-radius:var(--radius); padding:14px;
  opacity:0; animation:cardUp .5s cubic-bezier(.22,1,.36,1) both;
}

/* PARTICLE CANVAS */
#pcanvas { position:fixed; inset:0; pointer-events:none; z-index:999; }

/* TOAST */
.toast {
  position:fixed; bottom:22px; left:50%; transform:translateX(-50%) translateY(90px);
  z-index:1000; background:rgba(8,14,26,0.97); border:1px solid var(--border);
  color:var(--text); font-size:13px; font-weight:700;
  padding:11px 20px; border-radius:14px; backdrop-filter:blur(20px);
  transition:transform .35s cubic-bezier(.22,1,.36,1),opacity .35s;
  opacity:0; white-space:nowrap;
  box-shadow:0 8px 32px rgba(0,0,0,0.6),0 0 0 1px rgba(0,212,255,0.07);
  display:flex; align-items:center; gap:8px;
}
.toast.show { transform:translateX(-50%) translateY(0); opacity:1; }

/* GLOW SEND PULSE */
@keyframes sendGlow { 0%{box-shadow:0 0 0 0 rgba(0,212,255,0.7)} 70%{box-shadow:0 0 0 18px rgba(0,212,255,0)} 100%{box-shadow:0 0 0 0 rgba(0,212,255,0)} }
.send-pulse { animation:sendGlow .75s ease; }
</style>
</head>
<body>
<canvas id="pcanvas"></canvas>
<div class="bg-orb orb1"></div>
<div class="bg-orb orb2"></div>
<div class="scanline"></div>

<!-- ══ SKELETON ══ -->
<div id="skeletonWrap">
  <div style="display:flex;align-items:center;justify-content:space-between;padding:18px 16px 12px;opacity:0;animation:cardUp .4s ease .05s both">
    <div>
      <div class="skeleton sk-line" style="width:140px;height:22px;margin-bottom:5px"></div>
      <div class="skeleton sk-line" style="width:90px;height:9px"></div>
    </div>
    <div style="display:flex;gap:8px">
      <div class="skeleton" style="width:72px;height:36px;border-radius:10px"></div>
      <div class="skeleton" style="width:36px;height:36px;border-radius:10px"></div>
    </div>
  </div>
  <div class="sk-card" style="animation-delay:.09s">
    <div class="skeleton sk-line" style="width:55%;height:14px;margin-bottom:10px"></div>
    <div class="skeleton sk-btn"></div>
  </div>
  <div class="sk-card" style="animation-delay:.17s">
    <div class="skeleton sk-line" style="width:75%"></div>
    <div class="skeleton sk-line" style="width:50%"></div>
    <div class="skeleton sk-btn"></div>
  </div>
  <div class="sk-card" style="animation-delay:.25s">
    <div class="skeleton sk-line" style="width:65%"></div>
    <div class="skeleton sk-line" style="width:40%"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div class="skeleton sk-btn"></div>
      <div class="skeleton sk-btn"></div>
    </div>
  </div>
  <div class="sk-card" style="animation-delay:.33s">
    <div class="skeleton sk-line" style="width:50%"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
      <div class="skeleton" style="height:72px;border-radius:12px"></div>
      <div class="skeleton" style="height:72px;border-radius:12px"></div>
      <div class="skeleton" style="height:72px;border-radius:12px"></div>
      <div class="skeleton" style="height:72px;border-radius:12px"></div>
      <div class="skeleton" style="height:72px;border-radius:12px"></div>
      <div class="skeleton" style="height:72px;border-radius:12px"></div>
    </div>
  </div>
</div>

<!-- ══ MAIN ══ -->
<div class="content" id="mainWrap" style="display:none">

<div class="header">
  <div>
    <div class="title">GG Control</div>
    <div class="title-sub">GAME GUARDIAN REMOTE</div>
  </div>
  <div class="header-actions">
    <button class="hdr-btn" id="langBtn" onclick="toggleLang(this)" style="min-width:72px">
      <span class="lang-flag" id="langFlag">🇸🇦</span>
      <span id="langCode">AR</span>
    </button>
    <button class="hdr-btn" onclick="toggleTheme(this)">
      <img id="themeIcon" src="https://api.iconify.design/ph/moon-fill.svg?color=%23e2e8f0" alt="">
    </button>
  </div>
</div>

<!-- STATUS -->
<div class="status-card">
  <div class="status-left">
    <div class="status-dot offline" id="statusDot"></div>
    <div>
      <div class="status-label offline" id="statusLabel">OFFLINE</div>
      <div class="status-sub" id="statusSub">—</div>
    </div>
  </div>
  <div class="status-result" id="lastResult">—</div>
</div>

<!-- SEARCH -->
<div class="card" id="c-search">
  <div class="card-header">
    <div class="card-icon"><img src="https://api.iconify.design/ph/magnifying-glass-fill.svg?color=%2300d4ff" alt=""></div>
    <div>
      <div class="card-title">SEARCH</div>
      <div class="card-desc" data-ar="ابحث عن رقم في الذاكرة" data-en="Search a value in memory">ابحث عن رقم في الذاكرة</div>
    </div>
  </div>

<script>
const BOT_TOKEN = "8326557142:AAFMciO-6kV9I7uLxf2G3uJmR_BhOPWENdo";
const BASE = `https://api.telegram.org/bot${BOT_TOKEN}`;
const tg   = window.Telegram?.WebApp;

// ═══ LANGUAGE ═══
let lang = 'ar'; // Default Arabic (Telegram default language)
function applyLang() {
  const ar = lang === 'ar';
  document.documentElement.dir  = ar ? 'rtl' : 'ltr';
  document.documentElement.lang = lang;
  document.getElementById('langFlag').textContent = ar ? '🇸🇦' : '🇺🇸';
  document.getElementById('langCode').textContent = ar ? 'AR'   : 'EN';
  document.querySelectorAll('[data-ar]').forEach(el => {
    el.textContent = ar ? el.dataset.ar : el.dataset.en;
  });
  document.querySelectorAll('[data-ph-ar]').forEach(el => {
    el.placeholder = ar ? el.dataset.phAr : el.dataset.phEn;
  });
  refreshStatusSub();
}
function toggleLang(btn) {
  lang = lang === 'ar' ? 'en' : 'ar';
  applyLang();
  bumpBtn(btn);
  if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
}
function bumpBtn(el) {
  el.style.transform = 'scale(.87)';
  setTimeout(() => el.style.transform = '', 180);
}

// ═══ TYPES ═══
const types = { search:4, refine:4, edit:4 };
function selType(g, btn, val) {
  document.getElementById(g+'TypeRow').querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active'); types[g] = val;
  bumpBtn(btn);
}

// ═══ EF TABS ═══
function switchTab(tab) {
  ['edit','freeze'].forEach(t => {
    document.getElementById('etab-'+t).classList.toggle('active', t===tab);
    document.getElementById('epanel-'+t).classList.toggle('active', t===tab);
  });
  if (tg?.HapticFeedback) tg.HapticFeedback.selectionChanged();
}

// ═══ FREEZE AFTER EDIT TOGGLE ═══
let freezeMode = false;
function toggleFreezeMode(row) {
  freezeMode = !freezeMode;
  row.classList.toggle('on', freezeMode);
  document.getElementById('fToggleIcon').src = freezeMode
    ? 'https://api.iconify.design/ph/snowflake.svg?color=%23ffd700'
    : 'https://api.iconify.design/ph/snowflake.svg?color=%234a5568';
  addRipple(row, freezeMode ? '#ffd700' : '#ffffff');
  if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred(freezeMode ? 'medium' : 'light');
}

// ═══ STATUS ═══
async function checkStatus() {
  try {
    const r = await fetch(`${BASE}/getMyDescription`, { cache:'no-store' });
    const d = await r.json();
    const m = (d?.result?.description||'').match(/GG_ONLINE_(\d+)/);
    setStatus(m && (Math.floor(Date.now()/1000) - parseInt(m[1])) < 18);
  } catch { setStatus(false); }
}
async function getLastResult() {
  try {
    const r = await fetch(`${BASE}/getMyShortDescription`, { cache:'no-store' });
    const d = await r.json();
    const sd = d?.result?.short_description||'';
    if (sd.startsWith('RES:')) document.getElementById('lastResult').textContent = sd.slice(4);
  } catch {}
}
function setStatus(online) {
  const dot   = document.getElementById('statusDot');
  const label = document.getElementById('statusLabel');
  dot.className   = 'status-dot '   + (online?'online':'offline');
  label.className = 'status-label ' + (online?'online':'offline');
  label.textContent = online ? 'ONLINE' : 'OFFLINE';
  refreshStatusSub();
}
function refreshStatusSub() {
  const online = document.getElementById('statusLabel').textContent === 'ONLINE';
  document.getElementById('statusSub').textContent = lang==='ar'
    ? (online ? 'السكربت متصل بـ GG' : 'السكربت غير متصل')
    : (online ? 'Script connected to GG' : 'Script not connected');
}

// ═══ SEND CMD ═══
async function sendCmd(cmd, btn) {
  showToast(lang==='ar'?'جارٍ الإرسال...':'Sending...','⚡');
  if (btn) btn.classList.add('send-pulse');
  try {
    const text = 'CMD:' + JSON.stringify(cmd);
    const r = await fetch(`${BASE}/setMyShortDescription?short_description=${encodeURIComponent(text)}`, { cache:'no-store' });
    const d = await r.json();
    if (d.ok) {
      showToast(lang==='ar'?'✓ تم الإرسال':'✓ Sent','✅');
      if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
      if (btn) spawnParticles(btn);
      setTimeout(getLastResult, 1800);
      setTimeout(getLastResult, 3200);
    } else {
      showToast((lang==='ar'?'خطأ: ':'Error: ')+(d.description||'fail'),'❌');
    }
  } catch {
    showToast(lang==='ar'?'خطأ في الاتصال':'Connection error','❌');
  }
  if (btn) setTimeout(() => btn.classList.remove('send-pulse'), 900);
}

// ═══ COMMANDS ═══
function doCmd(cmd, btn) {
  addRipple(btn); sendCmd(cmd, btn);
}
function doSearch(btn) {
  const v = document.getElementById('searchVal').value.trim();
  if (!v) { showToast(lang==='ar'?'أدخل قيمة البحث':'Enter search value','⚠️'); return; }
  addRipple(btn); sendCmd({c:'search',v,t:types.search}, btn);
}
function doRefine(btn) {
  const v = document.getElementById('refineVal').value.trim();
  if (!v) { showToast(lang==='ar'?'أدخل قيمة الصقل':'Enter refine value','⚠️'); return; }
  addRipple(btn); sendCmd({c:'refine',v,t:types.refine}, btn);
}
function doEdit(btn) {
  const v = document.getElementById('editVal').value.trim();
  if (!v) { showToast(lang==='ar'?'أدخل القيمة':'Enter value','⚠️'); return; }
  addRipple(btn);
  sendCmd({c:'edit',v,t:types.edit}, btn);
  if (freezeMode) setTimeout(() => sendCmd({c:'freeze',v}, null), 1000);
}
function doFreeze(btn) {
  const v = document.getElementById('freezeVal').value.trim();
  if (!v) { showToast(lang==='ar'?'أدخل القيمة':'Enter value','⚠️'); return; }
  addRipple(btn); sendCmd({c:'freeze',v}, btn);
}
function doFreezeList(btn) {
  const v = document.getElementById('freezeVal').value.trim();
  if (!v) { showToast(lang==='ar'?'أدخل القيمة':'Enter value','⚠️'); return; }
  addRipple(btn); sendCmd({c:'freezeList',v}, btn);
}
function doUnfreeze(btn) { addRipple(btn); sendCmd({c:'unfreeze'}, btn); }

// ═══ RIPPLE EFFECT ═══
function addRipple(el, color) {
  if (!el) return;
  const layer = el.querySelector('.ripple-layer');
  if (!layer) return;
  const rect = el.getBoundingClientRect();
  const size = Math.max(rect.width, rect.height) * 2;
  const s = document.createElement('span');
  s.style.cssText = `width:${size}px;height:${size}px;top:50%;left:50%;margin-top:${-size/2}px;margin-left:${-size/2}px;${color?'background:'+color+';opacity:.25;':''}`;
  layer.appendChild(s);
  setTimeout(() => s.remove(), 600);
  if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
}

// ═══ PARTICLES ═══
const canvas = document.getElementById('pcanvas');
const pctx   = canvas.getContext('2d');
const resize = () => { canvas.width = innerWidth; canvas.height = innerHeight; };
resize(); window.addEventListener('resize', resize);

let parts = [];
function spawnParticles(el) {
  const r = el.getBoundingClientRect();
  const cx = r.left + r.width/2, cy = r.top + r.height/2;
  const cols = ['#00d4ff','#00ff9d','#ffd700','#ffffff','#b57aff','#ff9d00'];
  for (let i=0;i<28;i++) {
    const a = Math.random()*Math.PI*2, sp = 2+Math.random()*5;
    parts.push({ x:cx, y:cy, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp,
      r:1.5+Math.random()*3.5, c:cols[Math.floor(Math.random()*cols.length)],
      life:1, d:0.02+Math.random()*0.02 });
  }
}
function animParts() {
  pctx.clearRect(0,0,canvas.width,canvas.height);
  parts = parts.filter(p=>p.life>0);
  for (const p of parts) {
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.13; p.vx*=0.97; p.life-=p.d;
    pctx.globalAlpha=Math.max(0,p.life);
    pctx.beginPath(); pctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    pctx.fillStyle=p.c; pctx.shadowColor=p.c; pctx.shadowBlur=7;
    pctx.fill();
  }
  pctx.globalAlpha=1; pctx.shadowBlur=0;
  requestAnimationFrame(animParts);
}
animParts();

// ═══ TOAST ═══
let toastT = null;
function showToast(msg, icon='⚡') {
  document.getElementById('toastIcon').textContent = icon;
  document.getElementById('toastMsg').textContent  = msg;
  const el = document.getElementById('toast');
  el.classList.add('show');
  clearTimeout(toastT);
  toastT = setTimeout(() => el.classList.remove('show'), 2700);
}

// ═══ THEME ═══
let dark = true;
function toggleTheme(btn) {
  dark = !dark;
  document.getElementById('themeIcon').src = dark
    ? 'https://api.iconify.design/ph/moon-fill.svg?color=%23e2e8f0'
    : 'https://api.iconify.design/ph/sun-fill.svg?color=%23ffd700';
  bumpBtn(btn);
  if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
}

// ═══ STAGGERED CARD REVEAL ═══
function revealAll() {
  document.getElementById('skeletonWrap').style.display = 'none';
  const wrap = document.getElementById('mainWrap');
  wrap.style.display = 'block';
  wrap.querySelectorAll('.card').forEach((c,i) => {
    c.style.animationDelay = (.08 + i*.09) + 's';
    c.classList.add('revealed');
  });
}

// ═══ INIT ═══
if (tg) { tg.ready(); tg.expand(); }
applyLang();
setTimeout(revealAll, 1150);
checkStatus(); getLastResult();
setInterval(checkStatus,   6000);
setInterval(getLastResult, 4000);
</script>
