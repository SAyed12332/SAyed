

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 Not Found</title>
  <link rel="icon" href="https://www.google.com/favicon.ico" type="image/x-icon">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Roboto, Arial, sans-serif;
      background: #fff;
      color: #202124;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Top Google bar ── */
    .g-bar {
      width: 100%;
      height: 60px;
      background: #fff;
      border-bottom: 1px solid #e8eaed;
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 14px;
    }

    /* Google logo SVG — exact brand colors */
    .g-logo { height: 30px; }

    .g-bar-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .g-signin-btn {
      background: #1a73e8;
      color: #fff;
      font-family: 'Google Sans', Roboto, Arial, sans-serif;
      font-size: 14px;
      font-weight: 500;
      border: none;
      border-radius: 4px;
      padding: 8px 18px;
      cursor: pointer;
      letter-spacing: 0.25px;
    }
    .g-signin-btn:hover { background: #1765cc; }

    /* ── Main error container ── */
    .error-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 48px 24px 24px;
    }

    /* Dinosaur / Robot illustration — Google uses the T-Rex */
    .dino-img {
      width: 200px;
      margin-bottom: 32px;
      opacity: 0.9;
    }

    /* Error code */
    .error-code {
      font-size: 100px;
      font-weight: 700;
      color: #dadce0;
      line-height: 1;
      letter-spacing: -4px;
      font-family: Roboto, Arial, sans-serif;
      margin-bottom: 8px;
    }

    /* "That's an error." */
    .error-title {
      font-size: 24px;
      font-weight: 400;
      color: #202124;
      margin-bottom: 12px;
    }

    .error-desc {
      font-size: 14px;
      color: #5f6368;
      max-width: 460px;
      line-height: 1.6;
      margin-bottom: 6px;
    }

    .error-url {
      font-size: 14px;
      color: #5f6368;
      font-style: italic;
      margin-bottom: 28px;
    }

    .error-hint {
      font-size: 14px;
      color: #5f6368;
      margin-bottom: 36px;
    }

    /* Google blue link */
    a.g-link {
      color: #1a73e8;
      text-decoration: none;
      font-size: 14px;
    }
    a.g-link:hover { text-decoration: underline; }

    /* ── Divider before Telegram section ── */
    .sep {
      width: 320px;
      max-width: 90%;
      border: none;
      border-top: 1px solid #e8eaed;
      margin: 8px auto 28px;
    }

    /* ── Telegram section — plain HTML blue button as requested ── */
    .tg-section {
      text-align: center;
      margin-bottom: 48px;
    }

    .tg-section p {
      font-size: 13px;
      color: #5f6368;
      margin-bottom: 10px;
    }

    /*
     * Classic browser-native HTML button
     * with the standard blue #0000EE link color
     */
    .tg-section a.html-btn {
      display: inline-block;
      font-family: Arial, sans-serif;
      font-size: 13.3px;
      color: #0000EE;
      text-decoration: underline;
      background: #d0cbc7;
      border: 2px solid;
      border-color: #f5f5f5 #6b6b6b #6b6b6b #f5f5f5;
      padding: 4px 12px 5px;
      cursor: pointer;
      user-select: none;
      outline-offset: 1px;
    }
    .tg-section a.html-btn:hover  { background: #c3bebb; }
    .tg-section a.html-btn:active {
      border-color: #6b6b6b #f5f5f5 #f5f5f5 #6b6b6b;
      padding: 5px 11px 4px 13px;
    }
    .tg-section a.html-btn:visited { color: #551A8B; }

    /* ── Bottom Google footer ── */
    footer {
      background: #f8f9fa;
      border-top: 1px solid #e8eaed;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      height: 46px;
      flex-shrink: 0;
    }

    .footer-left, .footer-right {
      display: flex;
      gap: 24px;
      align-items: center;
    }

    footer a {
      font-size: 13px;
      color: #5f6368;
      text-decoration: none;
    }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <!-- Google top bar -->
  <div class="g-bar">
    <!-- Google Wordmark SVG — official brand colors -->
    <svg class="g-logo" viewBox="0 0 272 92" xmlns="http://www.w3.org/2000/svg">
      <!-- G -->
      <path fill="#4285F4" d="M115.75 47.18c0 12.77-9.99 22.18-22.25 22.18s-22.25-9.41-22.25-22.18C71.25 34.32 81.24 25 93.5 25s22.25 9.32 22.25 22.18zm-9.74 0c0-7.98-5.79-13.44-12.51-13.44S80.99 39.2 80.99 47.18c0 7.9 5.79 13.44 12.51 13.44s12.51-5.55 12.51-13.44z"/>
      <!-- O -->
      <path fill="#EA4335" d="M163.75 47.18c0 12.77-9.99 22.18-22.25 22.18s-22.25-9.41-22.25-22.18c0-12.85 9.99-22.18 22.25-22.18s22.25 9.32 22.25 22.18zm-9.74 0c0-7.98-5.79-13.44-12.51-13.44s-12.51 5.46-12.51 13.44c0 7.9 5.79 13.44 12.51 13.44s12.51-5.55 12.51-13.44z"/>
      <!-- O -->
      <path fill="#FBBC05" d="M209.75 26.34v39.82c0 16.38-9.66 23.07-21.08 23.07-10.75 0-17.22-7.19-19.66-13.07l8.48-3.53c1.51 3.61 5.21 7.87 11.17 7.87 7.31 0 11.84-4.51 11.84-13v-3.19h-.34c-2.18 2.69-6.38 5.04-11.68 5.04-11.09 0-21.25-9.66-21.25-22.09 0-12.52 10.16-22.26 21.25-22.26 5.29 0 9.49 2.35 11.68 4.96h.34v-3.61h9.25zm-8.56 20.92c0-7.81-5.21-13.52-11.84-13.52-6.72 0-12.35 5.71-12.35 13.52 0 7.73 5.63 13.36 12.35 13.36 6.63 0 11.84-5.63 11.84-13.36z"/>
      <!-- g -->
      <path fill="#4285F4" d="M225 3v65h-9.5V3h9.5z"/>
      <!-- e -->
      <path fill="#34A853" d="M262.02 54.48l7.56 5.04c-2.44 3.61-8.32 9.83-18.48 9.83-12.6 0-22.01-9.74-22.01-22.18 0-13.19 9.49-22.18 20.92-22.18 11.51 0 17.14 9.16 18.98 14.11l1.01 2.52-29.65 12.28c2.27 4.45 5.8 6.72 10.75 6.72 4.96 0 8.4-2.44 10.92-6.14zm-23.27-7.98l19.82-8.23c-1.09-2.77-4.37-4.7-8.23-4.7-4.95 0-11.84 4.37-11.59 12.93z"/>
    </svg>

    <div class="g-bar-right">
      <button class="g-signin-btn">Sign in</button>
    </div>
  </div>

  <!-- Main content -->
  <div class="error-container">

    <!-- Google T-Rex SVG (offline dino — Google's actual 404 mascot) -->
    <svg class="dino-img" viewBox="0 0 200 150" xmlns="http://www.w3.org/2000/svg">
      <!-- Body -->
      <ellipse cx="105" cy="90" rx="45" ry="30" fill="#5f6368"/>
      <!-- Head -->
      <rect x="130" y="44" width="50" height="34" rx="10" fill="#5f6368"/>
      <!-- Jaw -->
      <rect x="130" y="66" width="52" height="16" rx="6" fill="#5f6368"/>
      <!-- Eye -->
      <circle cx="168" cy="54" r="5" fill="#fff"/>
      <circle cx="169" cy="54" r="2.5" fill="#202124"/>
      <!-- Nostril -->
      <circle cx="178" cy="61" r="2" fill="#9aa0a6"/>
      <!-- Tiny arm -->
      <line x1="120" y1="88" x2="108" y2="100" stroke="#5f6368" stroke-width="7" stroke-linecap="round"/>
      <!-- Legs -->
      <rect x="85"  y="115" width="14" height="30" rx="5" fill="#5f6368"/>
      <rect x="107" y="118" width="14" height="28" rx="5" fill="#5f6368"/>
      <!-- Tail -->
      <path d="M62 88 Q30 82 20 100" stroke="#5f6368" stroke-width="14" fill="none" stroke-linecap="round"/>
      <!-- Spikes on back -->
      <polygon points="95,60 100,44 105,60" fill="#9aa0a6"/>
      <polygon points="108,56 113,40 118,56" fill="#9aa0a6"/>
      <polygon points="120,56 125,42 130,56" fill="#9aa0a6"/>
      <!-- Ground shadow -->
      <ellipse cx="100" cy="145" rx="72" ry="5" fill="#e8eaed"/>
    </svg>

    <div class="error-code">404</div>

    <h1 class="error-title">That's an error.</h1>

    <p class="error-desc">
      The requested URL was not found on this server.
    </p>

    <p class="error-hint">
      That's all we know. &nbsp;<a class="g-link" href="javascript:history.back()">Go back</a>
    </p>

    <hr class="sep">

    <!-- Telegram contact — regular blue HTML button as requested -->
    <div class="tg-section">
      <p>Need help? Contact the site admin:</p>
      <a href="https://t.me/elsayedashraf" target="_blank" class="html-btn">
        📬 t.me/elsayedashraf
      </a>
    </div>

  </div>

  <!-- Google footer -->
  <footer>
    <div class="footer-left">
      <a href="#">Advertising</a>
      <a href="#">Business</a>
      <a href="#">About</a>
    </div>
    <div class="footer-right">
      <a href="#">Privacy</a>
      <a href="#">Terms</a>
      <a href="#">Settings</a>
    </div>
  </footer>

</body>
</html>
