<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GG Script Maker</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: var(--tg-theme-bg-color, #ffffff);
            --text-color: var(--tg-theme-text-color, #222222);
            --hint-color: var(--tg-theme-hint-color, #999999);
            --link-color: var(--tg-theme-link-color, #248bcf);
            --button-color: var(--tg-theme-button-color, #248bcf);
            --button-text-color: var(--tg-theme-button-text-color, #ffffff);
            --secondary-bg: var(--tg-theme-secondary-bg-color, #f0f0f0);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 15px;
            direction: rtl; /* الافتراضي عربي */
        }

        .section {
            background-color: var(--secondary-bg);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
        }

        h2 { font-size: 1.1em; margin-top: 0; border-bottom: 1px solid var(--hint-color); padding-bottom: 5px; }

        input, textarea, select {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            border-radius: 8px;
            border: 1px solid var(--hint-color);
            background: var(--bg-color);
            color: var(--text-color);
            box-sizing: border-box;
        }

        .btn-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 8px;
        }

        button {
            background-color: var(--button-color);
            color: var(--button-text-color);
            border: none;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        button:active { opacity: 0.8; }

        .editor-area {
            background: #1e1e1e;
            color: #d4d4d4;
            font-family: 'Courier New', Courier, monospace;
            height: 200px;
            direction: ltr; /* الكود دائماً يسار */
        }

        #status { font-size: 0.8em; color: var(--link-color); text-align: center; }
    </style>
</head>
<body>

    <div id="main-content">
        <h1 id="title">صانع سكربتات GG</h1>

        <div class="section">
            <h2 id="sec-info">إعدادات السكربت الأساسية</h2>
            <input type="text" id="scriptName" placeholder="اسم السكربت">
            <input type="text" id="scriptPass" placeholder="كلمة المرور (اختياري)">
            <input type="date" id="expiryDate" title="تاريخ الانتهاء">
        </div>

        <div class="section">
            <h2 id="sec-search">عمليات البحث (GG Search)</h2>
            <div class="btn-grid">
                <button onclick="addCode('gg.setRanges(gg.REGION_ANONYMOUS | gg.REGION_C_ALLOC)')">Set Ranges</button>
                <button onclick="addCode('gg.searchNumber(\'100\', gg.TYPE_DWORD)')">Search DWORD</button>
                <button onclick="addCode('gg.getResults(100)')">Get Results</button>
                <button onclick="addCode('gg.editAll(\'999\', gg.TYPE_DWORD)')">Edit All</button>
                <button onclick="addCode('gg.clearResults()')">Clear</button>
            </div>
        </div>

        <div class="section">
            <h2 id="sec-ui">القوائم والواجهات (UI)</h2>
            <div class="btn-grid">
                <button onclick="addCode('gg.alert(\'Welcome\', \'OK\')')">Alert</button>
                <button onclick="addCode('gg.choice({\'Menu 1\', \'Menu 2\'}, nil, \'Choose\')')">Choice Menu</button>
                <button onclick="addCode('gg.toast(\'Active!\')')">Toast</button>
            </div>
        </div>

        <div class="section">
            <h2 id="sec-editor">الكود الناتج</h2>
            <textarea id="editor" class="editor-area" placeholder="-- Script will appear here..."></textarea>
            <div class="btn-grid" style="margin-top:10px;">
                <button style="background: #f44336;" onclick="clearEditor()">مسح الكل</button>
                <button onclick="exportOffline()">تصدير ملف (Offline)</button>
                <button onclick="exportOnline()">رفع أونلاين (Online)</button>
            </div>
        </div>
        
        <p id="status"></p>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // القاموس للترجمة
        const i18n = {
            ar: {
                title: "صانع سكربتات GG الشامل",
                info: "إعدادات السكربت",
                search: "عمليات البحث",
                ui: "الواجهات",
                editor: "الكود الناتج",
                p_name: "اسم السكربت",
                p_pass: "كلمة المرور"
            },
            en: {
                title: "GG Script Maker Pro",
                info: "Basic Settings",
                search: "Search Operations",
                ui: "UI Elements",
                editor: "Code Output",
                p_name: "Script Name",
                p_pass: "Password (Optional)"
            }
        };

        // تفعيل اللغة
        const lang = tg.initDataUnsafe?.user?.language_code === 'ar' ? 'ar' : 'en';
        document.body.style.direction = lang === 'ar' ? 'rtl' : 'ltr';
        document.getElementById('title').innerText = i18n[lang].title;
        document.getElementById('sec-info').innerText = i18n[lang].info;
        document.getElementById('scriptName').placeholder = i18n[lang].p_name;
        document.getElementById('scriptPass').placeholder = i18n[lang].p_pass;

        const editor = document.getElementById('editor');

        function addCode(code) {
            editor.value += code + "\n";
        }

        function clearEditor() {
            editor.value = "";
        }

        function buildFullScript() {
            let name = document.getElementById('scriptName').value || "MyScript";
            let pass = document.getElementById('scriptPass').value;
            let expiry = document.getElementById('expiryDate').value;
            
            let finalCode = `-- Built with GG Maker\n-- Name: ${name}\n`;
            
            if(pass) {
                finalCode += `local p = gg.prompt({'Password:'}, {''}, {'text'})\nif p[1] ~= '${pass}' then os.exit() end\n`;
            }
            
            if(expiry) {
                finalCode += `if os.date('%Y-%m-%d') > '${expiry}' then gg.alert('Expired!') os.exit() end\n`;
            }

            finalCode += "\n" + editor.value;
            return finalCode;
        }

        // تصدير أوفلاين
        function exportOffline() {
            const code = buildFullScript();
            const blob = new Blob([code], { type: 'text/plain' });
            const hour = new Date().getTime();
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `script_${hour}.lua`;
            link.click();
            tg.showAlert("تم تجهيز ملف السكربت بنجاح!");
        }

        // تصدير أونلاين (Hastebin)
        async function exportOnline() {
            const code = buildFullScript();
            document.getElementById('status').innerText = "جاري الرفع...";

            try {
                // ملاحظة: قد تحتاج لبروكسي لتجاوز CORS في المتصفح، هنا نستخدم Hastebin كمثال
                const response = await fetch('https://hastebin.com/documents', {
                    method: 'POST',
                    body: code
                });
                const data = await response.json();
                const rawLink = `https://hastebin.com/raw/${data.key}`;
                
                const loaderCode = `
-- Loader Script
local url = "${rawLink}"
local res = gg.makeRequest(url).content
local load_script = load(res)
if load_script then 
    load_script() 
else 
    print("Failed to load online script") 
end`;
                
                editor.value = loaderCode;
                tg.showPopup({
                    title: 'تم الرفع!',
                    message: 'تم استبدال الكود بكود الاتصال (MakeRequest). يمكنك الآن حفظه.',
                    buttons: [{type: 'ok'}]
                });
            } catch (e) {
                document.getElementById('status').innerText = "خطأ في الرفع: تأكد من إعدادات الـ CORS أو API Key";
                console.error(e);
            }
        }
    </script>
</body>
</html>
