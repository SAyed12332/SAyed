<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- لون شريط المتصفح (برتقالي نيون فاقع) -->
    <meta name="theme-color" content="#FF5500">
    
    <!-- لدعم متصفحات iOS Safari القديمة -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <title>اختبار اللون الفاقع</title>

    <style>
        body {
            background-color: #FF5500; /* نفس اللون الفاقع للخلفية */
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            background-color: #000000; /* خلفية سوداء لتوضيح التباين */
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            max-width: 80%;
        }
        h1 {
            color: #FF5500;
            margin-top: 0;
        }
        p {
            font-size: 1.1rem;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>التجربة باللون الفاقع!</h1>
        <p>إذا أصبح شريط العنوان في كروم باللون البرتقالي النيون، فالخاصية تعمل بنسبة 100%.</p>
    </div>

</body>
</html>
