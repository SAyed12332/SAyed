




<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>GG Control Panel</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#06090f; --cyan:#00d4ff; --green:#00ff9d; --red:#ff4060;
  --yellow:#ffd700; --purple:#b57aff; --text:#e2e8f0; --muted:#4a5568;
  --border:rgba(0,212,255,0.14); --card-bg:rgba(10,15,28,0.93); --r:16px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:72px;overflow-x:hidden;position:relative}

/* BG */
.orb{position:fixed;border-radius:50%;pointer-events:none;z-index:0;filter:blur(80px)}
.orb1{width:360px;height:360px;top:-90px;right:-80px;background:radial-gradient(circle,rgba(0,212,255,0.11),transparent);animation:orbA 11s ease-in-out infinite}
.orb2{width:290px;height:290px;bottom:90px;left:-60px;background:radial-gradient(circle,rgba(0,255,157,0.07),transparent);animation:orbB 13s ease-in-out infinite}
@keyframes orbA{0%,100%{transform:translate(0,0)}50%{transform:translate(-18px,28px)}}
@keyframes orbB{0%,100%{transform:translate(0,0)}50%{transform:translate(14px,-22px)}}
body::after{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(rgba(0,212,255,0.016) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,0.016) 1px,transparent 1px);
  background-size:40px 40px}
.scanline{position:fixed;inset:0;z-index:1;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.04) 2px,rgba(0,0,0,0.04) 4px)}
.wrap{position:relative;z-index:2}

/* HEADER */
.header{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 10px;
  opacity:0;animation:fadeD .45s cubic-bezier(.22,1,.36,1) .05s both}
@keyframes fadeD{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:none}}
.title{font-size:21px;font-weight:900;
  background:linear-gradient(110deg,var(--cyan),var(--green) 60%,#fff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 10px rgba(0,212,255,0.28))}
.title-sub{font-size:9px;font-family:'JetBrains Mono',monospace;color:var(--muted);letter-spacing:1.4px;margin-top:2px}
.hdr-acts{display:flex;gap:7px;align-items:center}
.hdr-btn{height:35px;border-radius:10px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);
  cursor:pointer;transition:all .18s cubic-bezier(.22,1,.36,1);display:flex;align-items:center;justify-content:center;
  color:var(--text);font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;padding:0 11px;gap:5px}
.hdr-btn img{width:15px;height:15px}
.hdr-btn:active{transform:scale(.87);background:rgba(255,255,255,0.09)}

/* STATUS CARD */
.status-card{margin:0 16px 13px;padding:12px 14px;border-radius:var(--r);background:var(--card-bg);
  border:1px solid var(--border);backdrop-filter:blur(14px);
  display:flex;align-items:center;justify-content:space-between;
  position:relative;overflow:hidden;cursor:pointer;user-select:none;
  opacity:0;animation:cardUp .48s cubic-bezier(.22,1,.36,1) .1s both;
  transition:border-color .2s}
.status-card:active{transform:scale(.985)}
.status-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--cyan),var(--green),transparent);opacity:.55}
.s-left{display:flex;align-items:center;gap:11px}
.s-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;position:relative;transition:all .4s}
.s-dot::after{content:'';position:absolute;inset:-5px;border-radius:50%;opacity:0}
/* ALL 3 states pulse */
.s-dot.online{background:var(--green);box-shadow:0 0 10px var(--green),0 0 22px rgba(0,255,157,0.35);animation:pOn 2.2s infinite}
.s-dot.online::after{background:radial-gradient(circle,rgba(0,255,157,0.25),transparent);opacity:1;animation:ping 2.2s infinite}
.s-dot.warning{background:var(--yellow);box-shadow:0 0 9px var(--yellow),0 0 18px rgba(255,215,0,0.3);animation:pWarn 1.6s infinite}
.s-dot.warning::after{background:radial-gradient(circle,rgba(255,215,0,0.22),transparent);opacity:1;animation:ping 1.6s infinite}
.s-dot.offline{background:var(--red);box-shadow:0 0 9px var(--red),0 0 18px rgba(255,64,96,0.3);animation:pOff 1.9s infinite}
.s-dot.offline::after{background:radial-gradient(circle,rgba(255,64,96,0.22),transparent);opacity:1;animation:ping 1.9s infinite}
@keyframes pOn  {0%,100%{opacity:1;transform:scale(1)}50%{opacity:.65;transform:scale(.8)}}
@keyframes pWarn{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.55;transform:scale(.82)}}
@keyframes pOff {0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
@keyframes ping {0%{transform:scale(1);opacity:.55}100%{transform:scale(3.2);opacity:0}}
.s-label{font-size:11px;font-family:'JetBrains Mono',monospace;font-weight:700;letter-spacing:.7px;transition:color .35s}
.s-label.online{color:var(--green)}.s-label.warning{color:var(--yellow)}.s-label.offline{color:var(--red)}
.s-sub{font-size:9.5px;color:var(--muted);margin-top:2px;font-family:'JetBrains Mono',monospace;transition:opacity .3s}
.s-lastseen{font-size:9px;margin-top:3px;font-family:'JetBrains Mono',monospace;letter-spacing:.2px;transition:all .4s;display:none}
.s-lastseen.show{display:block}
.s-lastseen.fresh{color:rgba(0,255,157,0.5)}.s-lastseen.stale{color:rgba(255,215,0,0.55)}.s-lastseen.dead{color:rgba(255,64,96,0.45)}

/* Last result chip — clickable */
.s-result{font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--cyan);max-width:130px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  background:rgba(0,212,255,0.07);border:1px solid rgba(0,212,255,0.18);
  padding:5px 10px;border-radius:9px;cursor:pointer;transition:all .18s;flex-shrink:0}
.s-result:active{background:rgba(0,212,255,0.16);transform:scale(.94)}

/* CARD */
.card{margin:0 16px 13px;background:var(--card-bg);border:1px solid var(--border);
  border-radius:var(--r);padding:13px;backdrop-filter:blur(14px);
  box-shadow:0 5px 25px rgba(0,0,0,0.3),inset 0 1px 0 rgba(255,255,255,0.035);
  position:relative;overflow:hidden;opacity:0;transform:translateY(14px) scale(.985)}
.card.in{animation:cardUp .5s cubic-bezier(.22,1,.36,1) both}
@keyframes cardUp{to{opacity:1;transform:translateY(0) scale(1)}}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--cyan),transparent);opacity:.3}
.ch{display:flex;align-items:center;gap:9px;margin-bottom:12px}
.ci{width:30px;height:30px;border-radius:9px;background:rgba(0,212,255,0.07);
  border:1px solid rgba(0,212,255,0.16);display:flex;align-items:center;justify-content:center;
  flex-shrink:0;filter:drop-shadow(0 0 7px rgba(0,212,255,0.3));transition:filter .25s}
.card:hover .ci{filter:drop-shadow(0 0 12px rgba(0,212,255,0.55))}
.ci img{width:16px;height:16px}
.ct{font-size:11px;font-weight:800;color:var(--cyan);font-family:'JetBrains Mono',monospace;letter-spacing:.6px;text-transform:uppercase}
.cd{font-size:10px;color:var(--muted);margin-top:1px}

/* INPUT */
input[type=text],input[type=number]{
  width:100%;padding:10px 13px;border-radius:10px;margin-bottom:8px;
  border:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.03);
  color:var(--text);font-family:'Tajawal',sans-serif;font-size:14px;
  outline:none;transition:all .22s cubic-bezier(.22,1,.36,1);-webkit-appearance:none}
input:focus{border-color:rgba(0,212,255,0.45);background:rgba(0,212,255,0.04);
  box-shadow:0 0 0 3px rgba(0,212,255,0.09),0 0 18px rgba(0,212,255,0.07);transform:translateY(-1px)}
input::placeholder{color:var(--muted)}

/* TYPE ROW */
.tr{display:flex;gap:5px;overflow-x:auto;padding-bottom:2px;margin-bottom:9px;scrollbar-width:none}
.tr::-webkit-scrollbar{display:none}
.tb{flex-shrink:0;padding:5px 11px;border-radius:7px;cursor:pointer;
  font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;
  background:rgba(255,255,255,0.04);color:var(--muted);border:1px solid rgba(255,255,255,0.06);
  transition:all .18s cubic-bezier(.22,1,.36,1)}
.tb.on{background:rgba(0,212,255,0.11);color:var(--cyan);border-color:rgba(0,212,255,0.32);
  box-shadow:0 0 9px rgba(0,212,255,0.18)}
.tb:active{transform:scale(.88)}

/* EXEC BTN */
.eb{width:100%;padding:11px;border-radius:11px;border:none;cursor:pointer;
  font-family:'Tajawal',sans-serif;font-size:14px;font-weight:800;
  display:flex;align-items:center;justify-content:center;gap:7px;
  transition:all .18s cubic-bezier(.22,1,.36,1);position:relative;overflow:hidden}
.eb img{width:16px;height:16px;transition:transform .2s}
.eb:active{transform:scale(.96)}
.eb:active img{transform:scale(1.18) rotate(-7deg)}
.bc{background:linear-gradient(135deg,rgba(0,212,255,0.14),rgba(0,212,255,0.06));color:var(--cyan);border:1px solid rgba(0,212,255,0.28)}
.bc:active{box-shadow:0 0 24px rgba(0,212,255,0.4),inset 0 0 14px rgba(0,212,255,0.08)}
.bg{background:linear-gradient(135deg,rgba(0,255,157,0.13),rgba(0,255,157,0.05));color:var(--green);border:1px solid rgba(0,255,157,0.28)}
.bg:active{box-shadow:0 0 24px rgba(0,255,157,0.4),inset 0 0 14px rgba(0,255,157,0.08)}
.br{background:linear-gradient(135deg,rgba(255,64,96,0.14),rgba(255,64,96,0.05));color:var(--red);border:1px solid rgba(255,64,96,0.28)}
.br:active{box-shadow:0 0 22px rgba(255,64,96,0.4),inset 0 0 14px rgba(255,64,96,0.08)}
.by{background:linear-gradient(135deg,rgba(255,215,0,0.12),rgba(255,215,0,0.04));color:var(--yellow);border:1px solid rgba(255,215,0,0.26)}
.by:active{box-shadow:0 0 20px rgba(255,215,0,0.35),inset 0 0 12px rgba(255,215,0,0.08)}
.bm{background:linear-gradient(135deg,rgba(255,255,255,0.05),rgba(255,255,255,0.02));color:var(--muted);border:1px solid rgba(255,255,255,0.07)}
.bm:active{box-shadow:0 0 14px rgba(255,255,255,0.1)}

/* QUICK GRID */
.qg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}
.qb{padding:10px 5px;border-radius:11px;border:none;cursor:pointer;
  font-family:'Tajawal',sans-serif;font-size:11px;font-weight:800;
  display:flex;flex-direction:column;align-items:center;gap:5px;
  transition:all .18s cubic-bezier(.22,1,.36,1);position:relative;overflow:hidden}
.qb img{width:19px;height:19px;transition:transform .18s}
.qb:active{transform:scale(.9)}
.qb:active img{transform:scale(1.18) rotate(-5deg)}

/* EF TABS */
.ef-tabs{display:flex;gap:4px;margin-bottom:11px;background:rgba(255,255,255,0.025);
  border-radius:10px;padding:4px;border:1px solid rgba(255,255,255,0.05)}
.ef-tab{flex:1;padding:7px;border-radius:7px;border:none;cursor:pointer;
  font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;
  background:transparent;color:var(--muted);letter-spacing:.4px;
  transition:all .2s cubic-bezier(.22,1,.36,1);display:flex;align-items:center;justify-content:center;gap:5px}
.ef-tab img{width:12px;height:12px}
.ef-tab.on{color:var(--cyan);background:rgba(0,212,255,0.11);box-shadow:0 0 10px rgba(0,212,255,0.18);border:1px solid rgba(0,212,255,0.22)}
.ef-tab.on.ft{color:var(--yellow);background:rgba(255,215,0,0.09);box-shadow:0 0 10px rgba(255,215,0,0.18);border-color:rgba(255,215,0,0.22)}
.ef-tab:active{transform:scale(.91)}
.ef-panel{display:none}
.ef-panel.on{display:block;animation:pi .28s cubic-bezier(.22,1,.36,1) both}
@keyframes pi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}

/* FREEZE TOGGLE — label always yellow */
.ftg{display:flex;align-items:center;justify-content:space-between;
  background:rgba(255,215,0,0.06);border:1px solid rgba(255,215,0,0.18);
  border-radius:10px;padding:9px 12px;margin-bottom:8px;
  cursor:pointer;transition:all .22s;user-select:none}
.ftg:active{transform:scale(.98)}
.ftg.on{background:rgba(255,215,0,0.12);border-color:rgba(255,215,0,0.42);box-shadow:0 0 15px rgba(255,215,0,0.15)}
.ftg-lbl{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:700;color:var(--yellow)}
.ftg-lbl img{width:14px;height:14px}
.sw{width:42px;height:22px;border-radius:11px;background:rgba(255,215,0,0.1);
  border:1px solid rgba(255,215,0,0.18);position:relative;transition:all .28s cubic-bezier(.22,1,.36,1);flex-shrink:0}
.sw::after{content:'';position:absolute;top:3px;width:14px;height:14px;border-radius:50%;
  background:rgba(255,215,0,0.32);transition:all .28s cubic-bezier(.22,1,.36,1);box-shadow:0 1px 4px rgba(0,0,0,0.4)}
html[dir=rtl] .sw::after{right:3px}
html[dir=ltr] .sw::after{left:3px}
.ftg.on .sw{background:rgba(255,215,0,0.28);border-color:rgba(255,215,0,0.55);box-shadow:0 0 10px rgba(255,215,0,0.3)}
.ftg.on .sw::after{background:var(--yellow);box-shadow:0 0 8px rgba(255,215,0,0.75)}
html[dir=rtl] .ftg.on .sw::after{right:auto;left:3px}
html[dir=ltr] .ftg.on .sw::after{left:auto;right:3px}

/* RANGES */
.rg{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.rb{padding:10px;border-radius:10px;cursor:pointer;background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.06);font-family:'JetBrains Mono',monospace;
  font-size:10px;font-weight:700;color:var(--text);
  display:flex;flex-direction:column;align-items:center;gap:2px;
  transition:all .2s cubic-bezier(.22,1,.36,1)}
.rb span{font-size:9px;color:var(--muted);font-weight:400}
.rb:active{transform:scale(.92);border-color:var(--cyan);box-shadow:0 0 12px rgba(0,212,255,0.3);color:var(--cyan);background:rgba(0,212,255,0.07)}

/* FREEZE BTNS */
.fb2{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:8px}

/* SKELETON */
.sk{background:linear-gradient(90deg,rgba(255,255,255,0.04) 25%,rgba(255,255,255,0.085) 50%,rgba(255,255,255,0.04) 75%);
  background-size:200% 100%;animation:shim 1.6s infinite;border-radius:10px}
@keyframes shim{to{background-position:-200% 0}}
.skc{margin:0 16px 13px;background:var(--card-bg);border:1px solid var(--border);
  border-radius:var(--r);padding:13px;opacity:0;animation:cardUp .5s cubic-bezier(.22,1,.36,1) both}

/* MODAL SHEET */
.overlay{position:fixed;inset:0;z-index:800;background:rgba(0,0,0,0.72);
  backdrop-filter:blur(8px);display:none;align-items:flex-end;justify-content:center}
.overlay.open{display:flex;animation:ov .22s ease both}
@keyframes ov{from{opacity:0}to{opacity:1}}
.sheet{width:100%;max-width:500px;background:rgba(7,12,23,0.99);
  border:1px solid rgba(0,212,255,0.1);border-radius:22px 22px 0 0;
  padding:0 0 26px;box-shadow:0 -10px 50px rgba(0,0,0,0.7);
  animation:su .3s cubic-bezier(.22,1,.36,1) both;
  max-height:75vh;display:flex;flex-direction:column}
@keyframes su{from{transform:translateY(100%)}to{transform:none}}
.sh-handle{width:38px;height:4px;border-radius:2px;background:rgba(255,255,255,0.12);margin:12px auto 0;flex-shrink:0}
.sh-head{display:flex;align-items:center;justify-content:space-between;
  padding:12px 17px 10px;border-bottom:1px solid rgba(255,255,255,0.05);flex-shrink:0}
.sh-title{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--cyan);letter-spacing:.7px}
.sh-close{width:27px;height:27px;border-radius:7px;border:none;cursor:pointer;
  background:rgba(255,255,255,0.05);color:var(--muted);font-size:14px;
  display:flex;align-items:center;justify-content:center;transition:.18s}
.sh-close:active{transform:scale(.85);background:rgba(255,64,96,0.18);color:var(--red)}
.sh-body{overflow-y:auto;flex:1;padding:10px 13px;scrollbar-width:thin;scrollbar-color:rgba(0,212,255,0.12) transparent}
.sh-body::-webkit-scrollbar{width:3px}
.sh-body::-webkit-scrollbar-thumb{background:rgba(0,212,255,0.15);border-radius:2px}

/* Result detail sheet */
.rd-val{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700;
  color:var(--cyan);background:rgba(0,212,255,0.07);border:1px solid rgba(0,212,255,0.18);
  border-radius:10px;padding:12px 14px;margin-bottom:12px;word-break:break-all;
  text-align:center;letter-spacing:.3px}
.rd-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;
  letter-spacing:.8px;margin-bottom:8px;text-transform:uppercase}
.rd-qacts{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:10px}
.rd-time{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-align:center;margin-top:8px}

/* Request log items */
.rl-item{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:9px;
  padding:9px 10px;border-radius:10px;margin-bottom:5px;
  background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.045);
  animation:ii .2s cubic-bezier(.22,1,.36,1) both}
@keyframes ii{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.rl-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.rl-dot.ok{background:var(--green);box-shadow:0 0 5px var(--green)}
.rl-dot.err{background:var(--red);box-shadow:0 0 5px var(--red)}
.rl-dot.pend{background:var(--yellow);box-shadow:0 0 5px var(--yellow);animation:pWarn 1s infinite}
.rl-info{min-width:0}
.rl-cmd{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--text)}
.rl-val{font-size:10px;color:var(--cyan);margin-top:1px;font-family:'JetBrains Mono',monospace;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rl-t{font-size:9px;color:var(--muted);margin-top:1px;font-family:'JetBrains Mono',monospace}
.rl-st{font-size:10px;font-weight:700;font-family:'JetBrains Mono',monospace;white-space:nowrap;text-align:right}
.rl-st.ok{color:var(--green)}.rl-st.err{color:var(--red)}.rl-st.pend{color:var(--yellow)}
.rl-empty{text-align:center;padding:28px 0;color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:11px}

/* CANVAS */
#pvc{position:fixed;inset:0;pointer-events:none;z-index:999}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);
  z-index:1000;background:rgba(8,13,24,0.97);border:1px solid var(--border);
  color:var(--text);font-size:13px;font-weight:700;padding:10px 18px;
  border-radius:13px;backdrop-filter:blur(20px);
  transition:transform .32s cubic-bezier(.22,1,.36,1),opacity .32s;
  opacity:0;white-space:nowrap;box-shadow:0 7px 28px rgba(0,0,0,0.55);
  display:flex;align-items:center;gap:7px}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* SEND GLOW */
@keyframes sg{0%{box-shadow:0 0 0 0 rgba(0,212,255,0.7)}70%{box-shadow:0 0 0 16px rgba(0,212,255,0)}100%{box-shadow:0 0 0 0 rgba(0,212,255,0)}}
.sp{animation:sg .7s ease}
</style>
</head>
<body>
<canvas id="pvc"></canvas>
<div class="orb orb1"></div><div class="orb orb2"></div>
<div class="scanline"></div>

<!-- SKELETON -->
<div id="skWrap">
  <div style="display:flex;align-items:center;justify-content:space-between;padding:16px 16px 10px;opacity:0;animation:cardUp .4s ease .05s both">
    <div><div class="sk" style="width:130px;height:20px;margin-bottom:5px"></div><div class="sk" style="width:85px;height:9px"></div></div>

<script>
const BOT = "8326557142:AAFMciO-6kV9I7uLxf2G3uJmR_BhOPWENdo";
const API = `https://api.telegram.org/bot${BOT}`;
const tg  = window.Telegram?.WebApp;
if(tg){tg.ready();tg.expand()}

// ── LANG ──
let L = 'ar';
function applyL(){
  const ar = L==='ar';
  document.documentElement.dir  = ar?'rtl':'ltr';
  document.documentElement.lang = L;
  document.getElementById('lgFlag').textContent = ar?'🇸🇦':'🇺🇸';
  document.getElementById('lgCode').textContent = ar?'AR':'EN';
  document.querySelectorAll('[data-ar]').forEach(el=>el.textContent=ar?el.dataset.ar:el.dataset.en);
  document.querySelectorAll('[data-ph-ar]').forEach(el=>el.placeholder=ar?el.dataset.phAr:el.dataset.phEn);
  syncSub();
}
function toggleLang(b){L=L==='ar'?'en':'ar';applyL();bump(b);hap('light')}
function bump(el){el.style.transform='scale(.87)';setTimeout(()=>el.style.transform='',170)}

// ── TYPES ──
const T={s:4,r:4,e:4};
function selT(g,b,v){
  document.getElementById(g+'Tr').querySelectorAll('.tb').forEach(x=>x.classList.remove('on'));
  b.classList.add('on');T[g]=v;bump(b)
}

// ── EF TABS ──
function swTab(t){
  ['e','f'].forEach(x=>{
    document.getElementById('et-'+x).classList.toggle('on',x===t);
    document.getElementById('ep-'+x).classList.toggle('on',x===t);
  });
  hap('selection')
}

// ── FREEZE TOGGLE ──
let fzMode=false;
function toggleFZ(row){fzMode=!fzMode;row.classList.toggle('on',fzMode);hap(fzMode?'medium':'light')}

// ── STATUS ──
let lastTS=0,retrying=false,lastResultText='',lastResultTime='';

async function fetchDesc(){
  const r=await fetch(`${API}/getMyDescription`,{cache:'no-store'});
  return ((await r.json())?.result?.description||'');
}
async function checkStatus(){
  try{
    let d=await fetchDesc(),m=d.match(/GG_ONLINE_(\d+)/);
    if(!m&&!retrying){retrying=true;await delay(2000);d=await fetchDesc();m=d.match(/GG_ONLINE_(\d+)/);retrying=false}
    if(m){lastTS=parseInt(m[1]);setAge(Math.floor(Date.now()/1000)-lastTS)}
    else setAge(Infinity);
  }catch{setAge(Infinity)}
}
async function fetchResult(){
  try{
    const r=await fetch(`${API}/getMyShortDescription`,{cache:'no-store'});
    const sd=((await r.json())?.result?.short_description||'');
    if(sd.startsWith('RES:')){
      lastResultText=sd.slice(4);
      lastResultTime=nowStr();
      document.getElementById('sResult').textContent=lastResultText;
    }
  }catch{}
}
function setAge(age){
  const dot=document.getElementById('sDot'),lbl=document.getElementById('sLabel');
  let state;
  if(age<10)      state='online';
  else if(age<25) state='warning';
  else            state='offline';
  dot.className='s-dot '+state;
  lbl.className='s-label '+state;
  lbl.textContent=state==='online'?'ONLINE':state==='warning'?'WEAK':'OFFLINE';
  syncSub(state);
  syncLastSeen(state,age);
}
function syncSub(s){
  s=s||curState();
  const el=document.getElementById('sSub'),ar=L==='ar';
  el.textContent=s==='online'?(ar?'السكربت متصل بـ GG':'Script connected to GG')
    :s==='warning'?(ar?'إشارة ضعيفة — اتصال متأخر':'Weak signal — delayed')
    :(ar?'السكربت غير متصل':'Script not connected');
}
function syncLastSeen(state,age){
  const el=document.getElementById('sLastSeen');
  // only show when offline
  if(state!=='offline'){el.classList.remove('show');return}
  if(!lastTS){el.classList.remove('show');return}
  el.classList.add('show');
  const ar=L==='ar';
  let cls='dead',txt;
  if(age<60)     txt=ar?`آخر اتصال: منذ ${age} ثانية`:`Last seen: ${age}s ago`;
  else           txt=ar?`آخر اتصال: منذ ${Math.floor(age/60)} دقيقة`:`Last seen: ${Math.floor(age/60)}m ago`;
  el.className='s-lastseen show '+cls;
  el.textContent=txt;
}
function curState(){
  const d=document.getElementById('sDot');
  return d.classList.contains('online')?'online':d.classList.contains('warning')?'warning':'offline';
}

// update last-seen every second (no API)
setInterval(()=>{
  if(curState()==='offline'&&lastTS) syncLastSeen('offline',Math.floor(Date.now()/1000)-lastTS);
},1000);

// Long-press status card → log sheet
let lpT=null;
document.getElementById('statusCard').addEventListener('pointerdown',()=>{lpT=setTimeout(openLog,550)});
['pointerup','pointercancel','pointermove'].forEach(e=>

// ── RESULT SHEET ──
function openResultSheet(){
  document.getElementById('rdVal').textContent = lastResultText||'—';
  document.getElementById('rdTime').textContent = lastResultTime?(L==='ar'?`الوقت: ${lastResultTime}`:`Time: ${lastResultTime}`):'';
  document.getElementById('rdTitle').textContent = L==='ar'?'آخر نتيجة':'Last Result';
  document.querySelectorAll('#rdOverlay [data-ar]').forEach(el=>el.textContent=L==='ar'?el.dataset.ar:el.dataset.en);
  openSheet('rdOverlay');
}

// ── LOG SHEET ──
const reqLog=[];
const CLBL={search:'SEARCH',refine:'REFINE',edit:'EDIT',freeze:'FREEZE',
  freezeList:'FREEZE LIST',unfreeze:'UNFREEZE',clear:'CLEAR',count:'COUNT',
  goto:'OPEN GG',hide:'HIDE',getResults:'GET RESULTS',ranges:'RANGES',sleep:'SLEEP'};

function openLog(){
  document.getElementById('rlTitle').textContent=L==='ar'?'سجل الطلبات':'REQUEST LOG';
  renderLog();openSheet('rlOverlay');hap('medium');
}
function renderLog(){
  const b=document.getElementById('rlBody');
  const empty=document.getElementById('rlEmpty');
  if(!reqLog.length){empty.textContent=L==='ar'?'لا توجد طلبات بعد':'No requests yet';b.innerHTML='';b.appendChild(empty);return}
  empty.style.display='none';
  b.innerHTML=reqLog.map((e,i)=>`
    <div class="rl-item" style="animation-delay:${i*.035}s">
      <div class="rl-dot ${e.st}"></div>
      <div class="rl-info">
        <div class="rl-cmd">${CLBL[e.c]||e.c}</div>
        ${e.v?`<div class="rl-val">→ ${e.v}</div>`:''}
        <div class="rl-t">${e.t}</div>
      </div>
      <div class="rl-st ${e.st}">${e.st==='ok'?'✓ OK':e.st==='err'?'✗ ERR':'...'} ${e.msg?`<br><small style="opacity:.6;font-size:9px">${e.msg}</small>`:''}</div>
    </div>`).join('');
}

// ── SHEETS ──
function openSheet(id){document.getElementById(id).classList.add('open')}
function closeSheet(id,ev){if(ev&&ev.target.id!==id)return;document.getElementById(id).classList.remove('open')}

// ── SEND CMD ──
async function sendCmd(cmd,btn){
  if(btn)btn.classList.add('sp');
  const entry={c:cmd.c,v:cmd.v||'',st:'pend',msg:'',t:nowStr()};
  reqLog.unshift(entry);if(reqLog.length>40)reqLog.pop();
  if(document.getElementById('rlOverlay').classList.contains('open'))renderLog();
  try{
    const text='CMD:'+JSON.stringify(cmd);
    const r=await fetch(`${API}/setMyShortDescription?short_description=${encodeURIComponent(text)}`,{cache:'no-store'});
    const d=await r.json();
    if(d.ok){
      entry.st='ok';hap('success');
      if(btn)spawnParts(btn);
      setTimeout(fetchResult,1800);setTimeout(fetchResult,3200);
    }else{
      entry.st='err';entry.msg=d.description||'fail';
      showToast((L==='ar'?'خطأ: ':'Error: ')+(d.description||'fail'),'❌');
    }
  }catch(ex){entry.st='err';entry.msg='network';showToast(L==='ar'?'خطأ في الاتصال':'Connection error','❌')}
  if(document.getElementById('rlOverlay').classList.contains('open'))renderLog();
  if(btn)setTimeout(()=>btn.classList.remove('sp'),850);
}

// ── HAPTIC ──
function hap(t){
  if(!tg?.HapticFeedback)return;
  if(t==='light'||t==='medium'||t==='heavy')tg.HapticFeedback.impactOccurred(t);
  else if(t==='success'||t==='error'||t==='warning')tg.HapticFeedback.notificationOccurred(t);
  else if(t==='selection')tg.HapticFeedback.selectionChanged();
}

// ── PARTICLES ──
const pvc=document.getElementById('pvc'),px=pvc.getContext('2d');
const rsz=()=>{pvc.width=innerWidth;pvc.height=innerHeight};rsz();window.addEventListener('resize',rsz);
let parts=[];
function spawnParts(el){
  const rc=el.getBoundingClientRect(),cx=rc.left+rc.width/2,cy=rc.top+rc.height/2;
  const cols=['#00d4ff','#00ff9d','#ffd700','#fff','#b57aff','#ff9d00'];
  for(let i=0;i<24;i++){const a=Math.random()*Math.PI*2,sp=2+Math.random()*5;
    parts.push({x:cx,y:cy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,r:1.5+Math.random()*3,c:cols[~~(Math.random()*cols.length)],life:1,d:.022+Math.random()*.02})}
}
function animP(){
  px.clearRect(0,0,pvc.width,pvc.height);parts=parts.filter(p=>p.life>0);
  for(const p of parts){p.x+=p.vx;p.y+=p.vy;p.vy+=.13;p.vx*=.97;p.life-=p.d;
    px.globalAlpha=Math.max(0,p.life);px.beginPath();px.arc(p.x,p.y,p.r,0,Math.PI*2);
    px.fillStyle=p.c;px.shadowColor=p.c;px.shadowBlur=7;px.fill()}
  px.globalAlpha=1;px.shadowBlur=0;requestAnimationFrame(animP)
}animP();

// ── TOAST ──
let toastT=null;
function showToast(msg,ico='⚡'){
  document.getElementById('tIco').textContent=ico;
  document.getElementById('tMsg').textContent=msg;
  const el=document.getElementById('toast');el.classList.add('show');
  clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),2700);
}

// ── THEME ──

    :'https://api.iconify.design/ph/sun-fill.svg?color=%23ffd700';

// ── HELPERS ──
function delay(ms){return new Promise(r=>setTimeout(r,ms))}
function nowStr(){const d=new Date();return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0')+':'+d.getSeconds().toString().padStart(2,'0')}

// ── REVEAL ──
function reveal(){
  document.getElementById('skWrap').style.display='none';
  const w=document.getElementById('mainWrap');w.style.display='block';
  w.querySelectorAll('.card').forEach((c,i)=>{c.style.animationDelay=(.07+i*.08)+'s';c.classList.add('in')});
}
