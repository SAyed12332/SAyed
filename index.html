<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#020208" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#020208" media="(prefers-color-scheme: dark)">
 
  <title>ELSAyed AshRaf — Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    :root{--cyan:#00f5ff;--magenta:#ff0080;--green:#39ff14;--purple:#bf00ff;--dp:#5a00b4;--dp2:#9933ff;--dark:#020208;}
    *{-ms-overflow-style:none;scrollbar-width:none;}
    ::-webkit-scrollbar{display:none;}
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    html{scroll-behavior:smooth;}
    body{background:var(--dark);color:#dde0f5;font-family:'Rajdhani',sans-serif;overflow-x:hidden;user-select:none;-webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;}
    #netCanvas{position:fixed;inset:0;width:100%;height:100%;z-index:0;pointer-events:none;}
    .scanlines{position:fixed;inset:0;pointer-events:none;z-index:50;background:repeating-linear-gradient(0deg,rgba(0,0,0,.015) 0px,rgba(0,0,0,.015) 1px,transparent 1px,transparent 4px);}
    .hex-field{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
    .hex{position:absolute;clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);animation:hexRise linear infinite;}
    @keyframes hexRise{0%{transform:translateY(110vh) rotate(0);opacity:0}5%{opacity:1}90%{opacity:.4}100%{transform:translateY(-15vh) rotate(270deg);opacity:0}}
    nav{position:fixed;top:0;left:0;right:0;z-index:200;padding:.95rem 1.3rem;display:flex;justify-content:space-between;align-items:center;background:rgba(2,2,8,.97);border-bottom:1px solid rgba(90,0,180,.18);}
    .nav-logo{font-family:'Orbitron',sans-serif;font-weight:700;font-size:.85rem;letter-spacing:2.5px;background:linear-gradient(110deg,var(--dp),var(--dp2),#c455ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 12px rgba(90,0,180,.65));white-space:nowrap;}
    .nav-links{display:flex;gap:2rem;list-style:none;}
    .nav-links>li{position:relative;}
    .nav-links>li>a{color:rgba(221,224,245,.58);text-decoration:none;font-size:.73rem;letter-spacing:2px;text-transform:uppercase;font-weight:600;transition:color .25s;position:relative;display:block;padding-bottom:4px;}
    .nav-links>li>a::after{content:'';position:absolute;bottom:-4px;left:0;width:0;height:1px;background:var(--cyan);transition:width .25s;}
    .nav-links>li:hover>a{color:var(--cyan);}
    .nav-links>li:hover>a::after{width:100%;}
    .nav-dd{position:absolute;top:calc(100%+14px);left:50%;transform:translateX(-50%) translateY(-5px);min-width:185px;opacity:0;pointer-events:none;background:rgba(4,2,14,.98);border:1px solid rgba(90,0,180,.3);transition:opacity .2s,transform .2s;z-index:300;}
    .nav-dd::before{content:'';position:absolute;top:-7px;left:50%;transform:translateX(-50%);border-left:6px solid transparent;border-right:6px solid transparent;border-bottom:6px solid rgba(90,0,180,.4);}
    .nav-dd::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(to right,transparent,var(--cyan),transparent);}
    .nav-links>li:hover .nav-dd{opacity:1;pointer-events:all;transform:translateX(-50%) translateY(0);}
    .nav-dd-label{padding:.48rem 1rem;font-family:'Orbitron',sans-serif;font-size:.5rem;letter-spacing:2.5px;text-transform:uppercase;color:rgba(221,224,245,.18);border-bottom:1px solid rgba(90,0,180,.1);}
    .nav-dd a{display:flex;align-items:center;gap:.48rem;padding:.56rem 1rem;font-size:.65rem;letter-spacing:1.5px;text-transform:uppercase;color:rgba(221,224,245,.48);text-decoration:none;border-bottom:1px solid rgba(90,0,180,.07);transition:all .18s;white-space:nowrap;}
    .nav-dd a:last-child{border-bottom:none;}
    .nav-dd a:hover{color:var(--cyan);background:rgba(0,245,255,.03);padding-left:1.28rem;}
    .nav-dd a .dd-dot{width:4px;height:4px;border-radius:50%;background:var(--cyan);flex-shrink:0;opacity:.55;}
    .nav-dd a:hover .dd-dot{opacity:1;}
    .ham-btn{display:none;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;padding:6px;z-index:201;}
    .ham-btn span{display:block;width:24px;height:2px;background:var(--dp2);border-radius:2px;transition:all .32s ease;}
    .ham-btn.open span:nth-child(1){transform:translateY(7px) rotate(45deg);}
    .ham-btn.open span:nth-child(2){opacity:0;transform:scaleX(0);}
    .ham-btn.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg);}
    .mobile-menu{display:flex;position:fixed;top:58px;right:.9rem;width:auto;min-width:148px;flex-direction:column;align-items:stretch;gap:.28rem;z-index:190;list-style:none;padding:.26rem;background:rgba(4,2,14,.99);border:1px solid rgba(90,0,180,.26);opacity:0;transform:translateX(10px) scale(.9);transform-origin:top right;transition:opacity .2s ease,transform .24s cubic-bezier(.34,1.4,.64,1);pointer-events:none;}
    .mobile-menu.open{opacity:1;transform:translateX(0) scale(1);pointer-events:all;}
    .mobile-menu li{width:100%;}
    .mobile-menu a{display:block;width:100%;text-align:center;padding:.6rem 1.4rem;font-family:'Orbitron',sans-serif;font-size:.6rem;letter-spacing:2px;color:rgba(221,224,245,.88);text-decoration:none;background:linear-gradient(155deg,rgba(90,0,180,.8),rgba(10,0,36,.97));border:1px solid rgba(153,51,255,.32);border-bottom:3px solid rgba(14,0,44,.99);transition:all .14s ease;}
    .mobile-menu a:hover{color:var(--cyan);background:linear-gradient(155deg,rgba(0,245,255,.1),rgba(90,0,180,.8));border-color:rgba(0,245,255,.36);}
    .mobile-menu a:active{transform:translateY(1px);border-bottom-width:1px;}
    section{position:relative;z-index:1;}
    .section-header{text-align:center;margin-bottom:2.5rem;}
    .section-title{font-family:'Orbitron',sans-serif;font-size:clamp(1.5rem,5vw,2.6rem);font-weight:700;color:#fff;display:inline-block;position:relative;}
    .section-title::after{content:'';position:absolute;bottom:-10px;left:50%;transform:translateX(-50%);width:50%;height:2px;background:linear-gradient(to right,transparent,var(--cyan),transparent);box-shadow:0 0 10px var(--cyan);}
    .fade-in{opacity:0;transform:translateY(24px);transition:opacity .7s ease,transform .7s ease;}
    .fade-in.visible{opacity:1;transform:translateY(0);}
    #hero{min-height:100vh;display:flex;align-items:flex-start;justify-content:center;text-align:center;padding:9rem 1.5rem 3rem;overflow:visible;position:relative;}
    .neon-grid{position:absolute;bottom:0;left:0;right:0;height:45%;background-image:linear-gradient(rgba(90,0,180,.07) 1px,transparent 1px),linear-gradient(90deg,rgba(90,0,180,.07) 1px,transparent 1px);background-size:55px 55px;transform:perspective(500px) rotateX(60deg);transform-origin:bottom;mask-image:linear-gradient(to top,black 8%,transparent);animation:gridPulse 5s ease-in-out infinite;pointer-events:none;}
    @keyframes gridPulse{0%,100%{opacity:.6}50%{opacity:.9}}
    .orb{position:absolute;border-radius:50%;filter:blur(65px);animation:orbFloat 10s ease-in-out infinite;pointer-events:none;}
    .orb-1{width:250px;height:250px;background:radial-gradient(circle,rgba(90,0,180,.18),transparent);top:10%;left:0%;}
    .orb-2{width:200px;height:200px;background:radial-gradient(circle,rgba(255,0,128,.13),transparent);top:15%;right:0%;animation-delay:-4s;}
    .orb-3{width:160px;height:160px;background:radial-gradient(circle,rgba(0,245,255,.1),transparent);bottom:25%;left:15%;animation-delay:-7s;}
    @keyframes orbFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-25px)}}
    .hero-content{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;width:100%;}
    .hero-tag{font-family:'JetBrains Mono',monospace;font-size:.72rem;letter-spacing:1.6px;color:var(--magenta);text-shadow:0 0 14px var(--magenta);margin-bottom:1.6rem;animation:fadeInDown .8s ease both;min-height:1.1em;}
    .hero-tag::after{content:'█';animation:blink .9s step-end infinite;font-size:.75em;vertical-align:middle;margin-left:2px;}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

    
    .hero-title{
  font-family: 'Rajdhani', sans-serif;
  font-size: clamp(2.8rem, 10vw, 6.6rem); 
  font-weight: 1000;
  line-height: 0.95;
  margin-bottom: 2rem;
  animation: fadeInUp .9s ease .1s both;
  letter-spacing: 1px;
}
    .glitch{position:relative;display:inline-block;background:linear-gradient(100deg,#4400a8,#7b00ff,#c44dff,#9922ff,#4400a8,#7b00ff);background-size:250% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 16px rgba(100,0,200,.7));animation:nameShimmer 4.5s linear infinite;}
    @keyframes nameShimmer{0%{background-position:250% center}100%{background-position:0% center}}
    .glitch::before,.glitch::after{content:attr(data-text);position:absolute;top:0;left:0;width:100%;background:linear-gradient(100deg,#4400a8,#7b00ff,#c44dff,#9922ff,#4400a8,#7b00ff);background-size:250% auto;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
    .glitch::before{animation:g1 6s infinite;}
    .glitch::after{animation:g2 6s infinite;}
    @keyframes g1{0%,87%,100%{transform:none;opacity:0}88%{transform:translate(-3px,0) skewX(-2deg);opacity:.6}89.5%{opacity:0}}
    @keyframes g2{0%,83%,100%{transform:none;opacity:0}84%{transform:translate(3px,0) skewX(2deg);opacity:.5}85.5%{opacity:0}}
    .hero-divider{width:130px;height:1px;margin:0 auto 1.8rem;background:linear-gradient(to right,transparent,rgba(0,245,255,.4),transparent);}

    .term-box{
      width:100%;max-width:390px;
      margin:0 auto 3.5rem;
      background:#06060e;
      border:1px solid rgba(255,255,255,.07);
      border-radius:7px;
      overflow:hidden;
      box-shadow:0 0 50px rgba(0,0,0,.7),
                 0 0 0 1px rgba(0,245,255,.025),
                 inset 0 1px 0 rgba(255,255,255,.03);
      animation:fadeInUp 1s ease .35s both;
    }
    .t-bar{
      display:flex;align-items:center;gap:.55rem;
      padding:.52rem .82rem;
      background:#0b0b1c;
      border-bottom:1px solid rgba(255,255,255,.04);
    }
    .t-dots{display:flex;gap:.32rem;}
    .td{width:9px;height:9px;border-radius:50%;display:block;}
    .td-r{background:#ff5f57;}
    .td-y{background:#febc2e;}
    .td-g{background:#28c840;}
    .t-bar-name{
      flex:1;text-align:center;
      font-family:'JetBrains Mono',monospace;
      font-size:.47rem;letter-spacing:2.5px;
      color:rgba(255,255,255,.13);
      text-transform:uppercase;
    }
    .t-body{
      padding:1.15rem 1.15rem 1.4rem;
      min-height:100px;
      display:flex;flex-direction:column;gap:.46rem;
    }
    .t-line{
      display:flex;align-items:center;gap:.42rem;
      font-family:'JetBrains Mono',monospace;
      font-size:.75rem;line-height:1.3;
    }
    .t-prompt-sym{
      color:rgba(255,255,255,.2);
      flex-shrink:0;font-size:.7rem;
    }
    .t-word-wrap{display:inline-flex;align-items:center;}

    @keyframes waveChar{
      0%  {opacity:0;transform:translateY(10px) scale(.88);}
      55% {opacity:1;transform:translateY(-2.5px) scale(1.06);}
      100%{opacity:1;transform:translateY(0px) scale(1);}
    }
    .wc{
      display:inline-block;
      opacity:0;
      animation:waveChar .42s cubic-bezier(.22,.68,0,1.3) forwards;
    }

    .t-dollar-line{
      display:flex;align-items:center;gap:.35rem;
      font-family:'JetBrains Mono',monospace;
      font-size:.78rem;margin-top:.12rem;
      opacity:0;transition:opacity .35s ease;
    }
    .t-dollar-line.vis{opacity:1;}
    .t-dollar-sym{color:rgba(255,255,255,.28);}
    .t-cursor-block{
      display:inline-block;
      width:.48rem;height:.85em;vertical-align:middle;
      background:var(--cyan);
      box-shadow:0 0 10px var(--cyan),0 0 22px rgba(0,245,255,.4);
      animation:blink .9s step-end infinite;
    }

    .hero-buttons{display:flex;gap:.9rem;justify-content:center;flex-wrap:wrap;animation:fadeInUp 1s ease .5s both;}
    .btn-hex{display:inline-flex;align-items:center;gap:.5rem;font-family:'Orbitron',sans-serif;font-weight:700;letter-spacing:2px;text-transform:uppercase;text-decoration:none;border:none;cursor:pointer;transition:all .3s;clip-path:polygon(10px 0%,100% 0%,calc(100% - 10px) 100%,0% 100%);user-select:none;-webkit-user-select:none;}
    .btn-hex svg{flex-shrink:0;}
    .btn-primary{padding:1.05rem 2.2rem;font-size:.72rem;background:linear-gradient(135deg,var(--dp),var(--dp2));color:#fff;box-shadow:0 0 24px rgba(90,0,180,.45),0 0 60px rgba(90,0,180,.15);}
    .btn-primary svg{width:15px;height:15px;}
    .btn-primary:hover{box-shadow:0 0 50px rgba(90,0,180,.85);transform:translateY(-2px);}
    .btn-secondary{padding:.85rem 1.75rem;font-size:.63rem;background:rgba(0,0,6,.95);color:var(--magenta);border:1px solid var(--magenta);}
    .btn-secondary svg{width:13px;height:13px;}
    .btn-secondary:hover{background:rgba(255,0,128,.08);box-shadow:0 0 35px rgba(255,0,128,.4);transform:translateY(-2px);}
    .hero-scroll{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;z-index:10;animation:fadeInUp 1.2s ease .85s both;}
    .hero-scroll-line{width:2px;height:46px;background:linear-gradient(to bottom,var(--cyan),transparent);box-shadow:0 0 10px rgba(0,245,255,.45);animation:scrollLineBounce 1.7s ease-in-out infinite;}
    @keyframes scrollLineBounce{0%,100%{transform:translateY(0);opacity:.45}50%{transform:translateY(10px);opacity:1}}

    #about{padding:5.5rem 1.3rem 4.5rem;max-width:720px;margin:0 auto;}
    .about-text{font-size:.96rem;line-height:1.88;color:rgba(221,224,245,.72);font-weight:300;}
    .about-text p{margin-bottom:.95rem;}
    .about-text p:last-child{margin-bottom:0;}
    .about-text strong{color:var(--cyan);font-weight:600;}
    .about-text em{color:rgba(221,224,245,.9);font-style:normal;}
    .code-badge{font-family:'JetBrains Mono',monospace;font-size:.66rem;color:var(--green);background:rgba(57,255,20,.06);border:1px solid rgba(57,255,20,.2);padding:.1rem .4rem;margin:0 .1rem;border-radius:2px;}

    #projects{padding:5rem 1.3rem;position:relative;overflow:hidden;background:linear-gradient(to bottom,transparent,rgba(90,0,180,.018),transparent);}
    #projects::before,#projects::after{content:'';position:absolute;left:0;right:0;height:1px;background:linear-gradient(to right,transparent,var(--dp),transparent);}
    #projects::before{top:0;}#projects::after{bottom:0;}
    .projects-wrap{max-width:1000px;margin:0 auto;}
    #projects .section-header{margin-bottom:1.4rem;}
    .proj-neon-stat{text-align:center;margin-bottom:.8rem;padding:.5rem 0;}
    .proj-neon-text{font-family:'Orbitron',sans-serif;font-size:clamp(1.4rem,5vw,2.3rem);font-weight:700;letter-spacing:7px;color:#fff;text-shadow:0 0 6px var(--cyan),0 0 15px var(--cyan),0 0 32px rgba(0,245,255,.65),0 0 65px rgba(0,245,255,.28);animation:neonFlicker 3.5s ease-in-out infinite;display:inline-block;}
    @keyframes neonFlicker{0%,86%,100%{text-shadow:0 0 6px var(--cyan),0 0 15px var(--cyan),0 0 32px rgba(0,245,255,.65),0 0 65px rgba(0,245,255,.28);}88%{text-shadow:0 0 3px var(--cyan),0 0 7px var(--cyan);}92%{text-shadow:0 0 10px var(--cyan),0 0 24px var(--cyan),0 0 52px rgba(0,245,255,.88),0 0 100px rgba(0,245,255,.42);}}
    .projects-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.9rem;}
    .proj-card{background:rgba(3,4,16,.96);border:1px solid rgba(0,245,255,.1);position:relative;transition:transform .35s,border-color .35s,box-shadow .35s;overflow:hidden;}
    .proj-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(0,245,255,.04),transparent);opacity:0;transition:opacity .35s;z-index:0;}
    .proj-card:hover{border-color:rgba(0,245,255,.28);box-shadow:0 0 30px rgba(0,245,255,.08);}
    .proj-card:hover::before{opacity:1;}
    .proj-card.vc{background:rgba(5,2,18,.96);border-color:rgba(191,0,255,.1);}
    .proj-card.vc:hover{border-color:rgba(191,0,255,.28);box-shadow:0 0 30px rgba(191,0,255,.08);}
    .proj-card.vc::before{background:linear-gradient(135deg,rgba(191,0,255,.04),transparent);}
    .card-thumb{position:relative;width:100%;height:92px;overflow:hidden;z-index:1;}
    .card-thumb svg{width:100%;height:100%;display:block;}
    .card-scan{position:absolute;top:0;left:0;right:0;height:2px;overflow:hidden;z-index:3;}
    .card-scan::after{content:'';position:absolute;top:0;left:-60%;width:60%;height:100%;background:linear-gradient(90deg,transparent,var(--cyan),transparent);animation:scanT 2.6s linear infinite;}
    .card-scan.ps::after{background:linear-gradient(90deg,transparent,var(--purple),transparent);}
    @keyframes scanT{0%{left:-60%}100%{left:160%}}
    .card-top-line{position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(to right,var(--magenta),var(--cyan));z-index:2;}
    .card-body{padding:.75rem .82rem .9rem;position:relative;z-index:1;}
    .proj-cat{font-size:.44rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--magenta);margin-bottom:.28rem;}
    .proj-title{font-family:'Orbitron',sans-serif;font-size:.7rem;font-weight:600;color:#fff;margin-bottom:.4rem;}
    .proj-desc{font-size:.71rem;line-height:1.55;color:rgba(221,224,245,.52);margin-bottom:.55rem;font-weight:300;}
    .proj-tags{display:flex;flex-wrap:wrap;gap:.22rem;margin-bottom:.55rem;}
    .proj-tag{padding:.09rem .38rem;font-size:.48rem;letter-spacing:.5px;background:rgba(57,255,20,.05);border:1px solid rgba(57,255,20,.2);color:var(--green);}
    .bot-badge{display:flex;align-items:center;gap:.48rem;padding:.48rem .6rem;margin-bottom:.55rem;border:1px solid rgba(0,245,255,.12);background:rgba(2,4,14,.97);transition:border-color .22s;}
    .bot-badge:hover{border-color:rgba(0,245,255,.24);}
    .bot-badge.p{border-color:rgba(191,0,255,.12);background:rgba(5,2,16,.97);}
    .bot-badge.p:hover{border-color:rgba(191,0,255,.24);}
    .bot-icon{width:20px;height:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .bot-icon svg{width:15px;height:15px;}
    .bot-info{flex:1;min-width:0;}
    .bot-lbl{font-family:'Orbitron',sans-serif;font-size:.42rem;letter-spacing:1px;color:var(--cyan);}
    .bot-badge.p .bot-lbl{color:var(--purple);}
    .bot-nm{font-family:'JetBrains Mono',monospace;font-size:.54rem;color:rgba(221,224,245,.3);margin-top:.05rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .bot-open{font-family:'Orbitron',sans-serif;font-size:.38rem;color:var(--cyan);border:1px solid rgba(0,245,255,.18);padding:.11rem .32rem;letter-spacing:.5px;transition:all .22s;white-space:nowrap;cursor:pointer;background:none;user-select:none;flex-shrink:0;}
    .bot-open:hover{background:rgba(0,245,255,.07);border-color:var(--cyan);}
    .bot-badge.p .bot-open{color:var(--purple);border-color:rgba(191,0,255,.18);}
    .bot-badge.p .bot-open:hover{background:rgba(191,0,255,.07);border-color:var(--purple);}
    .proj-actions{display:flex;gap:.32rem;margin-bottom:.55rem;}
    .btn-dl,.btn-demo{display:flex;align-items:center;justify-content:center;gap:.26rem;flex:1;padding:.58rem .2rem;font-family:'Orbitron',sans-serif;font-size:.42rem;letter-spacing:.6px;cursor:pointer;transition:all .25s;border:none;background:transparent;user-select:none;-webkit-user-select:none;min-height:36px;}
    .btn-dl{border:1px solid var(--cyan);color:var(--cyan);text-decoration:none;}
    .btn-dl:hover{background:rgba(0,245,255,.07);box-shadow:0 0 18px rgba(0,245,255,.22);}
    .btn-demo{border:1px solid var(--magenta);color:var(--magenta);}
    .btn-demo:hover{background:rgba(255,0,128,.07);box-shadow:0 0 18px rgba(255,0,128,.22);}
    .btn-demo.p{border-color:var(--purple);color:var(--purple);}
    .btn-demo.p:hover{background:rgba(191,0,255,.07);box-shadow:0 0 18px rgba
