<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GG Script Pro Maker</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: var(--tg-theme-bg-color, #ffffff);
            --text: var(--tg-theme-text-color, #000000);
            --hint: var(--tg-theme-hint-color, #707579);
            --btn: var(--tg-theme-button-color, #3390ec);
            --btn-text: var(--tg-theme-button-text-color, #ffffff);
            --sec-bg: var(--tg-theme-secondary-bg-color, #f4f4f5);
        }

        /* تنسيق يدوي للثيم الداكن عند التبديل */
        body.dark-mode {
            --bg: #1c1c1d;
            --text: #ffffff;
            --hint: #aaaaaa;
            --sec-bg: #2c2c2e;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: sans-serif;
            margin: 0; padding: 10px;
            transition: all 0.3s ease;
        }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        
        .card {
            background: var(--sec-bg);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        h3 { margin-top: 0; font-size: 16px; color: var(--btn); }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        button {
            background: var(--btn);
            color: var(--btn-text);
            border: none;
            padding: 10px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 13px;
        }

        input, textarea {
            width: 100%; padding: 10px; margin: 5px 0;
            border-radius: 8px; border: 1px solid var(--hint);
            background: var(--bg); color: var(--text);
            box-sizing: border-box;
        }

        #editor {
            height: 250px; font-family: monospace; direction: ltr;
            border: 2px solid var(--btn);
        }

        .fab {
            position: fixed; bottom: 20px; left: 20px;
            width: 50px; height: 50px; border-radius: 25px;
            background: var(--btn); color: white; border: none; font-size: 24px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h2 id="app-title">Script Maker Pro</h2>
        <button onclick="toggleTheme()" id="theme-btn">🌙</button>
    </div>

    <div class="card">
        <h3 id="h-settings">إعدادات الهوية</h3>
        <input type="text" id="s-name" placeholder="اسم السكربت">
        <input type="text" id="s-pass" placeholder="كلمة المرور">
    </div>

    <div class="card">
        <h3 id="h-tools">أدوات البرمجة</h3>
        <div class="grid">
            <button onclick="askSearch()">إضافة بحث (Search)</button>
            <button onclick="askEdit()">تعديل الكل (Edit)</button>
            <button onclick="askToast()">تنبيه (Toast)</button>
            <button onclick="askAlert()">رسالة (Alert)</button>
            <button onclick="addCode('gg.clearResults()')">مسح النتائج</button>
            <button onclick="askRange()">تحديد النطاق</button>
        </div>
    </div>

    <div class="card">
        <h3>المحرر النهائي</h3>
        <textarea id="editor" placeholder="-- الكود سيظهر هنا..."></textarea>
        <div class="grid" style="margin-top: 10px;">
            <button style="background: #e53935;" onclick="confirmClear()">مسح المحرر</button>
            <button onclick="exportFile()">حفظ كملف .lua</button>
        </div>
        <button style="width: 100%; margin-top: 10px; background: #4caf50;" onclick="exportOnline()">رفع أونلاين (Hastebin)</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // 1. نظام اللغات التلقائي
        const userLang = tg.initDataUnsafe?.user?.language_code || 'ar';
        const labels = {
            ar: { title: "صانع السكربتات المحترف", settings: "إعدادات السكربت", tools: "أدوات البرمجة", clear: "هل أنت متأكد من مسح الكود؟" },
            en: { title: "Script Maker Pro", settings: "Script Settings", tools: "Programming Tools", clear: "Are you sure to clear code?" }
        };

        const currentLabels = labels[userLang] || labels.en;
        document.getElementById('app-title').innerText = currentLabels.title;
        document.getElementById('h-settings').innerText = currentLabels.settings;
        document.getElementById('h-tools').innerText = currentLabels.tools;

        // 2. نظام الثيم اليدوي والتلقائي
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            document.getElementById('theme-btn').innerText = isDark ? '☀️' : '🌙';
        }

        // 3. إضافة الكود بسؤال المستخدم (Prompt)
        function addCode(code) {
            const editor = document.getElementById('editor');
            editor.value += code + "\n";
        }

        function askSearch() {
            const num = prompt("أدخل الرقم الذي تريد البحث عنه:", "100");
            if (num) {
                const type = prompt("أدخل نوع البيانات (1:DWORD, 2:FLOAT, 4:DOUBLE, 32:QWORD):", "4");
                addCode(`gg.searchNumber("${num}", ${type})`);
            }
        }

        function askEdit() {
            const val = prompt("القيمة الجديدة للتعديل:", "99999");
            if (val) {
                const type = prompt("نوع البيانات:", "4");
                addCode(`gg.editAll("${val}", ${type})`);
            }
        }

        function askToast() {
            const msg = prompt("نص التنبيه (Toast):", "تم التفعيل بنجاح");
            if (msg) addCode(`gg.toast("${msg}")`);
        }

        function askAlert() {
            const msg = prompt("محتوى الرسالة:", "مرحباً بك في السكربت");
            if (msg) addCode(`gg.alert("${msg}", "موافق")`);
        }

        function askRange() {
            addCode(`gg.setRanges(gg.REGION_ANONYMOUS | gg.REGION_C_ALLOC)`);
        }

        function confirmClear() {
            if (confirm(currentLabels.clear)) document.getElementById('editor').value = "";
        }

        // 4. تصدير الملف للجهاز (Fix)
        function exportFile() {
            const name = document.getElementById('s-name').value || "Script";
            const pass = document.getElementById('s-pass').value;
            let finalCode = `-- Created by Sayed\n`;
            
            if(pass) finalCode += `local p = gg.prompt({'Pass:'},{''},{'text'})\nif p[1] ~= '${pass}' then os.exit() end\n`;
            finalCode += document.getElementById('editor').value;

            const blob = new Blob([finalCode], { type: 'text/lua' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${name}.lua`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            tg.showAlert("تم حفظ الملف بنجاح!");
        }

        // 5. الرفع على Hastebin (مع معالجة الأخطاء)
        async function exportOnline() {
            const code = document.getElementById('editor').value;
            if(!code) return tg.showAlert("المحرر فارغ!");

            tg.showConfirm("هل تريد رفع الكود وتحويله لروابط أونلاين؟", async (ok) => {
                if(ok) {
                    try {
                        // ملاحظة: الرفع المباشر من المتصفح لـ Hastebin قد يرفضه السيرفر بسبب CORS
                        // يفضل استخدام واجهة برمجية (API) وسيطة، ولكن هنا سنحاول الرفع المباشر
                        const response = await fetch('https://hastebin.com/documents', {
                            method: 'POST',
                            body: code
                        });
                        const resData = await response.json();
                        const rawUrl = `https://hastebin.com/raw/${resData.key}`;
                        
                        const loader = `-- Loader Online\nlocal req = gg.makeRequest("${rawUrl}").content\nload(req)()`;
                        document.getElementById('editor').value = loader;
                        tg.showAlert("تم الرفع! الكود الآن يعمل عبر الإنترنت.");
                    } catch (err) {
                        tg.showAlert("فشل الرفع: قد يكون السيرفر محمي ضد الـ CORS. جرب استخدام Proxy.");
                    }
                }
            });
        }
    </script>
</body>
</html>
