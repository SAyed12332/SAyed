<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- الوسم الأساسي لمتصفح كروم وأندرويد -->
    <meta name="theme-color" content="#020208">
    
    <!-- وسوم إضافية لدعم متصفحات أخرى (اختياري) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <title>اختبار شريط المتصفح</title>

    <style>
        /* تنسيقات بسيطة لجعل الصفحة واضحة */
        body {
            background-color: #020208; /* نفس لون شريط المتصفح */
            color: #ffffff;
            font-family: Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            background-color: #111118;
            padding: 30px;
            border-radius: 12px;
            border: 1px solid #333;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        h1 {
            color: #4CAF50;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>اختبار ناجح!</h1>
        <p>إذا كان شريط العنوان بالأعلى يحمل اللون الداكن، فالكود يعمل بشكل سليم.</p>
    </div>

</body>
</html>
