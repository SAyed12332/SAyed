<!DOCTYPE html>
<html dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GG Script Maker Pro</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Tajawal', sans-serif;
  background-color: var(--tg-theme-bg-color, #ffffff);
  color: var(--tg-theme-text-color, #000000);
  min-height: 100vh;
  padding-bottom: 40px;
  transition: background .3s, color .3s;
}

/* ── HEADER ── */
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 16px 8px;
  position: sticky; top: 0; z-index: 50;
  background: var(--tg-theme-bg-color, #fff);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(128,128,128,0.1);
  animation: fadeUp .4s ease both;
}
.header-left { display: flex; align-items: center; gap: 10px; }
.app-icon {
  width: 38px; height: 38px; border-radius: 10px;
  background: var(--tg-theme-button-color, #2AABEE);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  box-shadow: 0 4px 12px color-mix(in srgb, var(--tg-theme-button-color,#2AABEE) 40%, transparent);
}
.app-title  { font-size: 17px; font-weight: 800; }
.app-sub    { font-size: 11px; color: var(--tg-theme-hint-color, #999); margin-top: 1px; }
.header-right { display: flex; gap: 8px; }
.icon-btn {
  width: 36px; height: 36px; border-radius: 10px;
  background: var(--tg-theme-secondary-bg-color, #f4f4f5);
  border: none; cursor: pointer; font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  transition: .15s; color: var(--tg-theme-text-color,#000);
}
.icon-btn:active { opacity: .7; transform: scale(.93); }

/* ── LANG BADGE ── */
.lang-badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 700;
  background: color-mix(in srgb, var(--tg-theme-button-color,#2AABEE) 15%, transparent);
  color: var(--tg-theme-button-color, #2AABEE);
  margin: 10px 16px 0;
  animation: fadeUp .4s .05s ease both;
}

/* ── TABS ── */
.tabs {
  display: flex; gap: 0; margin: 12px 16px 0;
  background: var(--tg-theme-secondary-bg-color, #f4f4f5);
  border-radius: 14px; padding: 4px;
  animation: fadeUp .4s .1s ease both;
}
.tab-btn {
  flex: 1; padding: 9px 4px; border: none; border-radius: 10px;
  font-family: 'Tajawal', sans-serif; font-size: 12px; font-weight: 700;
  cursor: pointer; transition: all .2s;
  color: var(--tg-theme-hint-color, #999);
  background: transparent;
}
.tab-btn.active {
  background: var(--tg-theme-button-color, #2AABEE);
  color: var(--tg-theme-button-text-color, #fff);
  box-shadow: 0 2px 10px color-mix(in srgb, var(--tg-theme-button-color,#2AABEE) 40%, transparent);
}

/* ── PAGES ── */
.page { display: none; padding: 14px 16px 0; animation: fadeUp .3s ease both; }
.page.active { display: block; }

/* ── CARDS ── */
.card {
  background: var(--tg-theme-secondary-bg-color, #f4f4f5);
  border-radius: 18px; padding: 14px; margin-bottom: 14px;
}
.card-label {
  font-size: 11px; font-weight: 700; letter-spacing: .7px;
  text-transform: uppercase; color: var(--tg-theme-hint-color,#999);
  margin-bottom: 10px; display: block;
}

/* ── INPUTS ── */
.field {
  width: 100%; padding: 11px 14px; border-radius: 12px;
  border: 1.5px solid rgba(128,128,128,0.15);
  background: var(--tg-theme-bg-color,#fff);
  color: var(--tg-theme-text-color,#000);
  font-family: 'Tajawal', sans-serif; font-size: 14px;
  outline: none; margin-bottom: 8px; transition: border-color .2s;
}
.field:focus { border-color: var(--tg-theme-button-color, #2AABEE); }
.field::placeholder { color: var(--tg-theme-hint-color, #999); }
.field:last-child { margin-bottom: 0; }

textarea.field {
  height: 210px; resize: none;
  font-family: 'JetBrains Mono', monospace;
  direction: ltr; font-size: 13px; line-height: 1.6;
}

/* ── BUTTONS ── */
.btn {
  background: var(--tg-theme-button-color, #2AABEE);
  color: var(--tg-theme-button-text-color, #fff);
  border: none; padding: 11px 14px; border-radius: 12px;
  font-family: 'Tajawal', sans-serif; font-size: 13px; font-weight: 700;
  cursor: pointer; transition: .2s; width: 100%;
}
.btn:active { transform: scale(.96); opacity: .85; }
.btn-danger  { background: #FF3B30; }
.btn-success { background: #34C759; }
.btn-neutral {
  background: var(--tg-theme-secondary-bg-color,#f4f4f5);
  color: var(--tg-theme-text-color,#000);
  border: 1.5px solid rgba(128,128,128,0.15);
}

.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }

/* ── TOOL BUTTONS ── */
.tool-btn {
  background: var(--tg-theme-bg-color, #fff);
  border: 1.5px solid rgba(128,128,128,0.12);
  border-radius: 14px; padding: 12px 8px;
  cursor: pointer; transition: .2s;
  display: flex; flex-direction: column; align-items: center; gap: 5px;
  font-family: 'Tajawal', sans-serif; color: var(--tg-theme-text-color,#000);
}
.tool-btn:active { transform: scale(.94); background: color-mix(in srgb, var(--tg-theme-button-color,#2AABEE) 10%, transparent); }
.tool-icon  { font-size: 24px; }
.tool-label { font-size: 11px; font-weight: 700; text-align: center; }
.tool-desc  { font-size: 10px; color: var(--tg-theme-hint-color,#999); text-align: center; }

/* ── CODE PREVIEW ── */
.code-preview {
  background: #1e1e2e; color: #cdd6f4;
  border-radius: 14px; padding: 14px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px; line-height: 1.7; direction: ltr;
  overflow-x: auto; white-space: pre; margin-bottom: 14px;
  border: 1px solid rgba(255,255,255,0.08);
  min-height: 60px;
}
.code-preview .kw  { color: #cba6f7; }
.code-preview .str { color: #a6e3a1; }
.code-preview .cm  { color: #585b70; }
.code-preview .fn  { color: #89b4fa; }
.code-preview .num { color: #fab387; }

/* ── TEMPLATE CHIPS ── */
.chips { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
.chip {
  padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 700;
  background: color-mix(in srgb, var(--tg-theme-button-color,#2AABEE) 12%, transparent);
  color: var(--tg-theme-button-color, #2AABEE);
  border: 1px solid color-mix(in srgb, var(--tg-theme-button-color,#2AABEE) 25%, transparent);
  cursor: pointer; transition: .15s;
}
.chip:active { background: color-mix(in srgb, var(--tg-theme-button-color,#2AABEE) 25%, transparent); }

/* ── SEND STATUS ── */
.send-status {
  border-radius: 14px; padding: 12px 14px; margin-bottom: 12px;
  font-size: 13px; font-weight: 600; text-align: center; display: none;
}
.send-status.ok  { background: #d1fae5; color: #065f46; }
.send-status.err { background: #fee2e2; color: #991b1b; }

/* ── ANIMATIONS ── */
@keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>

<!-- ══ HEADER ══ -->
<div class="header">
  <div class="header-left">
    <div class="app-icon">⚙️</div>
    <div>
      <div class="app-title" data-i18n="appTitle">صانع سكربتات GG</div>
      <div class="app-sub"  data-i18n="appSub">Pro Script Builder</div>
    </div>
  </div>
  <div class="header-right">
    <button class="icon-btn" id="themeBtn" onclick="toggleTheme()" title="Theme">🌙</button>
    <button class="icon-btn" id="previewBtn" onclick="switchTab('preview', document.querySelectorAll('.tab-btn')[2])" title="Preview">👁</button>
  </div>
</div>

<!-- LANG BADGE -->
<div class="lang-badge" id="langBadge">🌍 ar</div>

<!-- TABS -->
<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('builder',this)" data-i18n="tabBuilder">🔨 البناء</button>
  <button class="tab-btn"        onclick="switchTab('tools',this)"   data-i18n="tabTools">🛠 الأدوات</button>
  <button class="tab-btn"        onclick="switchTab('preview',this)" data-i18n="tabPreview">👁 معاينة</button>
  <button class="tab-btn"        onclick="switchTab('send',this)"    data-i18n="tabSend">🚀 إرسال</button>
</div>

<!-- ══ TAB: BUILDER ══ -->
<div class="page active" id="tab-builder">

  <div class="card">
    <span class="card-label" data-i18n="lblSettings">إعدادات السكربت</span>
    <input class="field" id="scriptName" data-i18n-ph="phName" placeholder="اسم السكربت (مثال: Sayed_Hack)">
    <input class="field" id="scriptPass" data-i18n-ph="phPass" placeholder="كلمة مرور (اختياري)">
    <input class="field" id="scriptAuthor" data-i18n-ph="phAuthor" placeholder="اسم المطور (اختياري)">
  </div>

  <div class="card">
    <span class="card-label" data-i18n="lblTemplates">قوالب جاهزة</span>
    <div class="chips" id="templatesChips"></div>
  </div>

  <div class="card">
    <span class="card-label" data-i18n="lblEditor">محرر الكود</span>
    <textarea class="field" id="editor" data-i18n-ph="phEditor" placeholder="-- اكتب كود Lua هنا..."></textarea>
    <div class="grid-2" style="margin-top:8px">
      <button class="btn btn-neutral" onclick="clearEditor()" data-i18n="btnClear">❌ مسح</button>
      <button class="btn" onclick="formatCode()" data-i18n="btnFormat">✨ تنسيق</button>
    </div>
  </div>

</div>

<!-- ══ TAB: TOOLS ══ -->
<div class="page" id="tab-tools">

  <div class="card">
    <span class="card-label" data-i18n="lblSearchEdit">بحث وتعديل</span>
    <div class="grid-2" id="toolsSearchGrid"></div>
  </div>

  <div class="card">
    <span class="card-label" data-i18n="lblUI">واجهة المستخدم</span>
    <div class="grid-2" id="toolsUIGrid"></div>
  </div>

  <div class="card">
    <span class="card-label" data-i18n="lblMemory">الذاكرة والمناطق</span>
    <div class="grid-2" id="toolsMemGrid"></div>
  </div>

  <div class="card">
    <span class="card-label" data-i18n="lblSnippets">مقاطع سريعة</span>
    <div class="grid-3" id="toolsSnipGrid"></div>
  </div>

</div>

<!-- ══ TAB: PREVIEW ══ -->
<div class="page" id="tab-preview">
  <div class="card">
    <span class="card-label" data-i18n="lblCodePreview">معاينة الكود الكامل</span>
    <div class="code-preview" id="codePreview">-- اضغط تحديث لعرض الكود</div>
    <button class="btn" onclick="refreshPreview()" data-i18n="btnRefresh">🔄 تحديث المعاينة</button>
  </div>
  <div class="card">
    <span class="card-label" data-i18n="lblStats">إحصائيات</span>
    <div id="codeStats" style="font-size:13px;line-height:2;color:var(--tg-theme-hint-color,#999)">—</div>
  </div>
</div>

<!-- ══ TAB: SEND ══ -->
<div class="page" id="tab-send">
  <div class="card">
    <span class="card-label" data-i18n="lblBotToken">توكن البوت</span>
    <input class="field" id="botToken" type="password" data-i18n-ph="phToken" placeholder="ضع توكن البوت هنا">
    <div style="font-size:11px;color:var(--tg-theme-hint-color,#999);margin-top:4px" data-i18n="tokenNote">
      * التوكن لا يُحفظ ولا يُرسل لأي مكان — يُستخدم فقط لإرسال الملف
    </div>
  </div>

  <div class="card">
    <span class="card-label" data-i18n="lblExport">تصدير الملف</span>
    <div class="grid-2">
      <button class="btn btn-neutral" onclick="downloadFile()" data-i18n="btnDownload">💾 تحميل .lua</button>
      <button class="btn" onclick="copyCode()" data-i18n="btnCopyCode">📋 نسخ الكود</button>
    </div>
  </div>

  <div class="send-status" id="sendStatus"></div>

  <button class="btn btn-success" style="font-size:15px;padding:14px" onclick="sendToBot()" data-i18n="btnSend">
    🚀 إرسال الملف للبوت
  </button>
</div>
